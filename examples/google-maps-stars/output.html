<style>
:root {
  --primary: #a03b00;
  --primary-container: #c94c00;
  --primary-fixed: #ffdbcd;
  --primary-fixed-dim: #ffb597;
  --on-primary: #ffffff;
  --accent-glow: #E8400D;
  --secondary: #d5baff;
  --secondary-container: #7b40e0;
  --tertiary: #4d44e3;
  --accent-cyan: #00D4FF;
  --bg: #fff8f6;
  --surface: #fff8f6;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fbf2ef;
  --surface-container: #f5ece9;
  --surface-container-high: #efe6e3;
  --fg-1: #1e1b19;
  --fg-2: #594138;
  --fg-muted: #8d7166;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.12);
  --outline-variant: #e1bfb2;
  --green: #10b981;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --font-headline: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 20px; --space-2xl: 24px;
  --space-3xl: 32px; --space-4xl: 48px; --space-5xl: 64px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --shadow-sm: 0 1px 2px rgba(30,27,25,0.04);
  --shadow-md: 0 4px 12px rgba(30,27,25,0.08);
  --shadow-lg: 0 8px 24px rgba(30,27,25,0.12);
  --shadow-accent: 0 8px 24px rgba(160,59,0,0.15);
  --gradient-primary: linear-gradient(135deg, #a03b00 0%, #c94c00 100%);
  --gradient-hero: linear-gradient(135deg, #a03b00 0%, #7b40e0 100%);

  --map-land: #f0ebe5;
  --map-border: #d4c5bc;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060B18;
    --surface: #0B1426;
    --surface-container-lowest: #101D35;
    --surface-container-low: #101D35;
    --surface-container: #162544;
    --surface-container-high: #1c2d52;
    --fg-1: #F8FAFC;
    --fg-2: #CBD5E1;
    --fg-muted: #64748B;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --primary: #FF6B35;
    --accent-glow: #00D4FF;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    --map-ocean: #0a1628;
    --map-land: #162544;
    --map-border: #1c2d52;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg-1);
  font-size: 15px;
  line-height: 1.6;
  overflow-x: hidden;
}
/* Header */
.site-header {
  padding: var(--space-xl) var(--space-2xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--surface-container-low);
  position: sticky; top: 0; z-index: 100;
  gap: var(--space-lg);
  flex-wrap: wrap;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title {
  font-family: var(--font-headline);
  font-size: 18px; font-weight: 700;
  color: var(--fg-1);
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.header-sub { font-size: 12px; color: var(--fg-muted); font-weight: 400; }
.header-search {
  display: flex; align-items: center; gap: var(--space-sm);
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: var(--space-sm) var(--space-lg);
  flex: 1; max-width: 320px; min-width: 160px;
}
.header-search svg { flex-shrink: 0; color: var(--fg-muted); }
.header-search input {
  border: none; background: transparent;
  color: var(--fg-1); font-family: var(--font-body);
  font-size: 14px; outline: none; width: 100%;
}
.header-search input::placeholder { color: var(--fg-muted); }

/* Atlas callout */
.atlas-callout {
  margin: var(--space-2xl) var(--space-2xl) 0;
  background: var(--surface-container-low);
  border: 1px solid var(--outline-variant);
  border-radius: var(--radius-xl);
  padding: var(--space-xl) var(--space-2xl);
  display: flex; align-items: center; gap: var(--space-lg);
}
.atlas-callout .callout-icon {
  font-size: 28px; flex-shrink: 0;
}
.atlas-callout .callout-text {
  font-size: 15px; color: var(--fg-2); line-height: 1.5;
}
.atlas-callout .callout-text strong {
  color: var(--primary); font-weight: 700;
}

/* Stats strip */
.stats-strip {
  display: flex; gap: var(--space-lg);
  padding: var(--space-2xl);
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-strip::-webkit-scrollbar { display: none; }
.stat-card {
  background: var(--surface-container-low);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg) var(--space-xl);
  min-width: 140px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.stat-card .stat-number {
  font-family: var(--font-headline);
  font-size: 28px; font-weight: 700;
  color: var(--primary); letter-spacing: -0.02em;
  line-height: 1;
}
.stat-card .stat-label {
  font-size: 12px; color: var(--fg-muted);
  margin-top: var(--space-xs); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.stat-card .stat-detail {
  font-size: 11px; color: var(--fg-muted);
  margin-top: var(--space-xs);
}

/* Map section */
.map-section {
  margin: 0 var(--space-2xl) var(--space-2xl);
  background: var(--surface-container-lowest);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  position: relative;
}
.map-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-lg) var(--space-2xl);
  border-bottom: 1px solid var(--border);
  background: var(--surface-container-low);
}
.map-section-header h2 {
  font-family: var(--font-headline);
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.01em; color: var(--fg-1);
}
.map-controls {
  display: flex; gap: var(--space-sm); align-items: center;
}
.map-btn {
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: var(--space-xs) var(--space-sm);
  font-size: 13px; color: var(--fg-2);
  cursor: pointer; font-family: var(--font-body);
  transition: background 0.15s;
}
.map-btn:hover { background: var(--surface-container-high); }
#map-container {
  width: 100%; height: 420px;
  position: relative; cursor: grab;
  overflow: hidden;
  background: var(--map-ocean);
  user-select: none;
}
#map-container.grabbing { cursor: grabbing; }
@media (min-width: 768px) { #map-container { height: 520px; } }
@media (min-width: 1200px) { #map-container { height: 600px; } }
#world-svg {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: 0 0;
}
.map-pin {
  cursor: pointer;
  transition: transform 0.15s;
  transform-origin: center bottom;
}
.map-pin:hover { transform: scale(1.3); }
.map-pin circle {
  fill: var(--primary);
  stroke: var(--on-primary);
  stroke-width: 1.5;
}
.map-pin.highlighted circle { fill: var(--accent-glow); }
.map-pin.cluster circle { fill: var(--secondary-container); }
.map-pin.cluster text { fill: white; font-size: 9px; font-weight: 700; font-family: var(--font-headline); }

/* Tooltip */
#map-tooltip {
  position: fixed;
  background: var(--surface-container-lowest);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: var(--space-md) var(--space-lg);
  box-shadow: var(--shadow-lg);
  pointer-events: none;
  z-index: 1000;
  max-width: 220px;
  display: none;
}
#map-tooltip .tip-name {
  font-family: var(--font-headline);
  font-size: 13px; font-weight: 600;
  color: var(--fg-1); line-height: 1.3;
}
#map-tooltip .tip-note {
  font-size: 11px; color: var(--fg-muted);
  margin-top: var(--space-xs); line-height: 1.4;
}

/* Side panel */
#side-panel {
  position: fixed; top: 0; right: 0;
  width: min(360px, 100vw);
  height: 100vh;
  background: var(--surface-container-lowest);
  border-left: 1px solid var(--border-strong);
  box-shadow: var(--shadow-lg);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#side-panel.open { transform: translateX(0); }
.panel-header {
  padding: var(--space-xl) var(--space-2xl) var(--space-lg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: var(--space-md);
}
.panel-name {
  font-family: var(--font-headline);
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.01em; color: var(--fg-1);
  line-height: 1.3; flex: 1;
}
.panel-close {
  background: var(--surface-container);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; color: var(--fg-muted);
  font-size: 16px; line-height: 1;
  transition: background 0.15s;
}
.panel-close:hover { background: var(--surface-container-high); color: var(--fg-1); }
.panel-body {
  flex: 1; overflow-y: auto;
  padding: var(--space-xl) var(--space-2xl);
  display: flex; flex-direction: column;
  gap: var(--space-lg);
}
.panel-row { display: flex; flex-direction: column; gap: var(--space-xs); }
.panel-row-label {
  font-size: 11px; color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.panel-row-value {
  font-size: 14px; color: var(--fg-2); line-height: 1.5;
}
.panel-row-value.note {
  font-style: italic; color: var(--fg-1);
  font-size: 15px;
}
.panel-maps-link {
  display: inline-flex; align-items: center; gap: var(--space-sm);
  background: var(--gradient-primary);
  color: var(--on-primary); border: none;
  border-radius: var(--radius-pill);
  padding: var(--space-md) var(--space-xl);
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  cursor: pointer; text-decoration: none;
  margin-top: var(--space-sm);
  box-shadow: var(--shadow-accent);
  transition: opacity 0.15s;
}
.panel-maps-link:hover { opacity: 0.88; }
.panel-coords {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--fg-muted);
}

/* Cities section */
.section {
  margin: 0 var(--space-2xl) var(--space-2xl);
}
.section-title {
  font-family: var(--font-headline);
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--fg-1);
  margin-bottom: var(--space-xl);
}
.city-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-lg);
}
.city-card {
  background: var(--surface-container-low);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s, transform 0.2s;
}
.city-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.city-card-header {
  padding: var(--space-lg) var(--space-xl);
  background: var(--surface-container);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.city-card-header .city-name {
  font-family: var(--font-headline);
  font-size: 15px; font-weight: 700;
  color: var(--fg-1); letter-spacing: -0.01em;
}
.city-badge {
  background: var(--primary-fixed);
  color: var(--primary);
  border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 700;
  padding: 2px var(--space-sm);
  font-family: var(--font-mono);
}
.city-toggle { color: var(--fg-muted); font-size: 12px; transition: transform 0.2s; }
.city-toggle.open { transform: rotate(180deg); }
.city-places {
  display: none;
  flex-direction: column;
}
.city-places.open { display: flex; }
.city-place-item {
  padding: var(--space-md) var(--space-xl);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex; flex-direction: column; gap: 2px;
}
.city-place-item:last-child { border-bottom: none; }
.city-place-item:hover { background: var(--surface-container); }
.city-place-name {
  font-size: 13px; font-weight: 600; color: var(--fg-1);
  line-height: 1.3;
}
.city-place-note {
  font-size: 12px; color: var(--fg-muted);
  font-style: italic; line-height: 1.4;
}

/* List view */
.list-section {
  margin: 0 var(--space-2xl) var(--space-5xl);
}
.list-controls {
  display: flex; gap: var(--space-md); align-items: center;
  margin-bottom: var(--space-xl);
  flex-wrap: wrap;
}
.list-filter-btn {
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: var(--space-xs) var(--space-md);
  font-size: 12px; font-weight: 600;
  color: var(--fg-2); cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}
.list-filter-btn.active, .list-filter-btn:hover {
  background: var(--primary); color: var(--on-primary);
  border-color: var(--primary);
}
.places-list {
  display: flex; flex-direction: column;
  gap: var(--space-sm);
}
.place-row {
  background: var(--surface-container-low);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: var(--space-lg) var(--space-xl);
  display: flex; align-items: center; gap: var(--space-lg);
  cursor: pointer; transition: all 0.15s;
  position: relative;
}
.place-row:hover {
  background: var(--surface-container);
  border-color: var(--border-strong);
  box-shadow: var(--shadow-sm);
  transform: translateX(2px);
}
.place-row.hidden { display: none; }
.place-row.highlighted {
  border-color: var(--primary);
  background: var(--primary-fixed);
}
.place-row-pin {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gradient-primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow-accent);
}
.place-row-pin svg { width: 14px; height: 14px; fill: white; }
.place-row-body { flex: 1; min-width: 0; }
.place-row-name {
  font-family: var(--font-headline);
  font-size: 14px; font-weight: 600;
  color: var(--fg-1); letter-spacing: -0.01em;
  line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.place-row-note {
  font-size: 12px; color: var(--fg-muted);
  font-style: italic; line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.place-row-city {
  font-size: 11px; font-weight: 600;
  color: var(--fg-2);
  background: var(--surface-container-high);
  border-radius: var(--radius-pill);
  padding: 2px var(--space-sm);
  white-space: nowrap; flex-shrink: 0;
  display: none;
}
@media (min-width: 480px) { .place-row-city { display: block; } }
.place-row-link {
  color: var(--primary); flex-shrink: 0;
  text-decoration: none; font-size: 11px; font-weight: 600;
  opacity: 0; transition: opacity 0.15s;
}
.place-row:hover .place-row-link { opacity: 1; }

/* Search highlight */
mark {
  background: var(--primary-fixed);
  color: var(--primary);
  border-radius: 2px;
  padding: 0 1px;
}
.empty-state {
  text-align: center; padding: var(--space-4xl);
  color: var(--fg-muted); font-size: 14px;
}

/* Overlay */
#panel-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 499;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#panel-overlay.active { opacity: 1; pointer-events: all; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 3px; }

@media (max-width: 600px) {
  .site-header { padding: var(--space-md) var(--space-lg); }
  .atlas-callout { margin: var(--space-lg) var(--space-lg) 0; padding: var(--space-lg); }
  .stats-strip { padding: var(--space-lg); gap: var(--space-md); }
  .map-section, .section, .list-section { margin-left: var(--space-lg); margin-right: var(--space-lg); }
}
</style>

  // Mercator projection
  function latLngToXY(lat, lng, width, height) {
    const x = (lng + 180) * (width / 360);
    const latRad = lat * Math.PI / 180;
    const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
    const y = height / 2 - (height * mercN) / (2 * Math.PI);
    return { x, y };
  }

  // Determine city from coordinates and name
  function inferCity(place) {
    const name = place.name || '';
    const cityKeywords = [
      { keys: ['Tokyo', 'Shibuya', 'Shinjuku', 'Akasaka', 'Kanda', 'Ginza', 'Toyosu'], city: 'Tokyo' },
      { keys: ['Kyoto', 'Nishijin', 'Arashiyama', 'Gion'], city: 'Kyoto' },
      { keys: ['Osaka', 'Namba', 'Dotonbori'], city: 'Osaka' },
      { keys: ['Paris', 'Marais', 'Montmartre', 'Seine', 'Louvre'], city: 'Paris' },
      { keys: ['Lisbon', 'Lisboa', 'Alfama', 'Bairro'], city: 'Lisbon' },
      { keys: ['Mexico City', 'Roma Norte', 'Condesa', 'Polanco', 'CDMX'], city: 'Mexico City' },
      { keys: ['Stockholm', 'Gamla Stan', 'Södermalm'], city: 'Stockholm' },
      { keys: ['Reykjavik', 'Reykjavík'], city: 'Reykjavik' },
      { keys: ['Marrakech', 'Marrakesh', 'Medina'], city: 'Marrakech' },
      { keys: ['Sydney', 'Bondi', 'Surry Hills'], city: 'Sydney' },
      { keys: ['Turin', 'Torino'], city: 'Turin' },
      { keys: ['Copenhagen', 'København'], city: 'Copenhagen' },
      { keys: ['Barcelona', 'Barceloneta', 'Eixample'], city: 'Barcelona' },
      { keys: ['New York', 'Manhattan', 'Brooklyn', 'NYC'], city: 'New York' },
      { keys: ['London', 'Soho', 'Shoreditch', 'Hackney'], city: 'London' },
      { keys: ['Berlin', 'Mitte', 'Prenzlauer'], city: 'Berlin' },
      { keys: ['Amsterdam'], city: 'Amsterdam' },
      { keys: ['Rome', 'Roma', 'Trastevere'], city: 'Rome' },
      { keys: ['Istanbul', 'Beyoğlu'], city: 'Istanbul' },
      { keys: ['Seoul', 'Gangnam', 'Itaewon'], city: 'Seoul' },
      { keys: ['Bangkok', 'Sukhumvit'], city: 'Bangkok' },
      { keys: ['Singapore'], city: 'Singapore' },
      { keys: ['Hong Kong'], city: 'Hong Kong' },
      { keys: ['Mumbai', 'Bombay'], city: 'Mumbai' },
      { keys: ['Buenos Aires'], city: 'Buenos Aires' },
      { keys: ['São Paulo', 'Sao Paulo'], city: 'São Paulo' },
      { keys: ['Cairo', 'Giza'], city: 'Cairo' },
      { keys: ['Nairobi'], city: 'Nairobi' },
      { keys: ['Cape Town'], city: 'Cape Town' },
    ];
    for (const { keys, city } of cityKeywords) {
      for (const k of keys) {
        if (name.includes(k)) return city;
      }
    }
    // Coord-based fallback
    const { lat, lng } = place;
    if (lat > 35.5 && lat < 35.8 && lng > 139.6 && lng < 139.9) return 'Tokyo';
    if (lat > 34.9 && lat < 35.1 && lng > 135.6 && lng < 135.9) return 'Kyoto';
    if (lat > 34.6 && lat < 34.8 && lng > 135.4 && lng < 135.6) return 'Osaka';
    if (lat > 48.7 && lat < 49.0 && lng > 2.2 && lng < 2.5) return 'Paris';
    if (lat > 38.6 && lat < 38.8 && lng > -9.3 && lng < -9.1) return 'Lisbon';
    if (lat > 19.2 && lat < 19.6 && lng > -99.3 && lng < -99.0) return 'Mexico City';
    if (lat > 59.2 && lat < 59.5 && lng > 17.8 && lng < 18.2) return 'Stockholm';
    if (lat > 64.0 && lat < 64.2 && lng > -22.1 && lng < -21.8) return 'Reykjavik';
    if (lat > 31.5 && lat < 31.7 && lng > -8.1 && lng < -7.9) return 'Marrakech';
    if (lat > -34.0 && lat < -33.7 && lng > 150.9 && lng < 151.3) return 'Sydney';
    if (lat > 45.0 && lat < 45.2 && lng > 7.6 && lng < 7.8) return 'Turin';
    return 'Other';
  }

  // Compute continent from lat/lng
  function inferContinent(lat, lng) {
    if (lat > 35 && lat < 72 && lng > -25 && lng < 60) return 'Europe';
    if (lat > -37 && lat < 37 && lng > -20 && lng < 55) return 'Africa';
    if (lat > -10 && lat < 80 && lng > 55 && lng < 180) return 'Asia';
    if (lat > -50 && lat < -10 && lng > 110 && lng < 180) return 'Oceania';
    if (lat > 15 && lat < 75 && lng > -170 && lng < -50) return 'North America';
    if (lat > -60 && lat < 15 && lng > -85 && lng < -30) return 'South America';
    return 'Other';
  }

  // ============= APP =============
  const places = DATA.places || [];

  // Enrich with city/continent
  places.forEach(p => {
    p._city = inferCity(p);
    p._continent = inferContinent(p.lat, p.lng);
    p._displayName = p.name.replace(/,\s*.*/,'').trim() || p.name;
  });

  // Stats
  const totalPlaces = places.length;
  const cities = {};
  const continents = new Set();
  places.forEach(p => {
    cities[p._city] = (cities[p._city] || 0) + 1;
    continents.add(p._continent);
  });
  const sortedCities = Object.entries(cities).sort((a,b) => b[1]-a[1]);
  const topCity = sortedCities[0];
  const numCities = Object.keys(cities).length;
  const numContinents = continents.size;

  // Atlas callout
  const calloutLines = [
    `You've saved <strong>${totalPlaces} places</strong> across `,
    `<strong>${numCities} cities</strong> and <strong>${numContinents} continent${numContinents!==1?'s':''}</strong>`,
  ];
  if (topCity) calloutLines.push(` — ${topCity[1]} of them in <strong>${topCity[0]}</strong>.`);
  document.getElementById('callout-text').innerHTML = calloutLines.join('');

  // Stats strip
  const statsStrip = document.getElementById('stats-strip');
  const statsData = [
    { number: totalPlaces, label: 'Places Saved', detail: 'across the world' },
    { number: numCities, label: 'Cities', detail: 'from ' + (sortedCities[0]?sortedCities[0][0]:'—') },
    { number: numContinents, label: 'Continents', detail: [...continents].join(', ').slice(0,28) },
    ...(topCity ? [{ number: topCity[1], label: 'In '+topCity[0], detail: 'most-saved city' }] : []),

  statsData.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-number">${s.number}</div><div class="stat-label">${s.label}</div><div class="stat-detail">${s.detail}</div>`;
    statsStrip.appendChild(card);
  });

  // ============= MAP =============
  const SVG_W = 1000, SVG_H = 500;
  const worldSvg = document.getElementById('world-svg');
  const landGroup = document.getElementById('world-land');
  const pinsLayer = document.getElementById('pins-layer');
  const mapContainer = document.getElementById('map-container');
  const tooltip = document.getElementById('map-tooltip');

  // Draw land
  Object.entries(WORLD_PATHS).forEach(([id, d]) => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('id', 'land-' + id);
    landGroup.appendChild(path);
  });

  // Pan/zoom state
  let transform = { x: 0, y: 0, scale: 1 };
  let isDragging = false, dragStart = { x: 0, y: 0 }, lastTransform = { x: 0, y: 0 };

  function applyTransform() {
    worldSvg.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
    worldSvg.style.transformOrigin = '0 0';
  }

  function clampTransform() {
    const cw = mapContainer.clientWidth;
    const ch = mapContainer.clientHeight;
    const sw = SVG_W * transform.scale * (cw / SVG_W);
    const sh = SVG_H * transform.scale * (ch / SVG_H);
    // Actually the SVG is scaled via the viewBox, let's keep it simple
    const minX = Math.min(0, cw - cw * transform.scale);
    const maxX = 0;
    const minY = Math.min(0, ch - ch * transform.scale);
    const maxY = 0;
    transform.x = Math.max(minX, Math.min(maxX, transform.x));
    transform.y = Math.max(minY, Math.min(maxY, transform.y));
  }

  mapContainer.addEventListener('mousedown', e => {
    isDragging = true;
    mapContainer.classList.add('grabbing');
    dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    transform.x = e.clientX - dragStart.x;
    transform.y = e.clientY - dragStart.y;
    clampTransform();
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    mapContainer.classList.remove('grabbing');
  });

  // Touch
  let lastTouch = null;
  mapContainer.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      dragStart = { x: e.touches[0].clientX - transform.x, y: e.touches[0].clientY - transform.y };
    }
  }, { passive: true });
  mapContainer.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      transform.x = e.touches[0].clientX - dragStart.x;
      transform.y = e.touches[0].clientY - dragStart.y;
      clampTransform();
      applyTransform();
    }
  }, { passive: true });
  mapContainer.addEventListener('touchend', () => { isDragging = false; });

  // Scroll zoom
  mapContainer.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.85 : 1.18;
    const newScale = Math.max(0.8, Math.min(8, transform.scale * delta));
    const rect = mapContainer.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    transform.x = mx - (mx - transform.x) * (newScale / transform.scale);
    transform.y = my - (my - transform.y) * (newScale / transform.scale);
    transform.scale = newScale;
    clampTransform();
    applyTransform();
  }, { passive: false });

  document.getElementById('zoom-in').addEventListener('click', () => {
    const cw = mapContainer.clientWidth, ch = mapContainer.clientHeight;
    transform.scale = Math.min(8, transform.scale * 1.4);
    transform.x = cw/2 - (cw/2 - transform.x) * 1.4;
    transform.y = ch/2 - (ch/2 - transform.y) * 1.4;
    clampTransform(); applyTransform();
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    const cw = mapContainer.clientWidth, ch = mapContainer.clientHeight;
    transform.scale = Math.max(0.8, transform.scale / 1.4);
    transform.x = cw/2 - (cw/2 - transform.x) / 1.4;
    transform.y = ch/2 - (ch/2 - transform.y) / 1.4;
    clampTransform(); applyTransform();
  });
  document.getElementById('zoom-reset').addEventListener('click', () => {
    transform = { x: 0, y: 0, scale: 1 };
    applyTransform();
  });

  // Create pins
  function getPlaceXY(place) {
    const cw = SVG_W, ch = SVG_H;
    return latLngToXY(place.lat, place.lng, cw, ch);
  }

  const pinEls = [];
  places.forEach((place, idx) => {
    const { x, y } = getPlaceXY(place);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'map-pin');
    g.setAttribute('data-idx', idx);
    g.setAttribute('transform', `translate(${x},${y})`);
    g.style.opacity = '0';
    g.innerHTML = `<circle cx="0" cy="0" r="5"/><line x1="0" y1="0" x2="0" y2="6" stroke="var(--primary)" stroke-width="1"/>`;
    pinsLayer.appendChild(g);
    pinEls.push(g);

    // Animate drop-in
    setTimeout(() => {
      g.style.transition = 'opacity 0.3s, transform 0.3s';
      g.style.opacity = '1';
    }, 300 + idx * 12);

    // Tooltip
    g.addEventListener('mouseenter', e => {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      document.getElementById('tip-name').textContent = place._displayName;
      document.getElementById('tip-note').textContent = place.note || place.comment || place._city;
    });
    g.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    g.addEventListener('click', () => openPanel(place));
  });

  function placeCard(place, idx) {
    const note = place.note || place.comment || 'Saved place';
    return `<button class="place-row" data-idx="${idx}" data-city="${place._city}">
      <span class="place-row-pin" aria-hidden="true">•</span>
      <span class="place-row-body">
        <span class="place-row-name">${escapeHtml(place._displayName)}</span>
        <span class="place-row-note">${escapeHtml(note)}</span>
      </span>
      <span class="place-row-city">${escapeHtml(place._city)}</span>
    </button>`;
  }

  function renderCities() {
    const grid = document.getElementById('city-grid');
    grid.innerHTML = sortedCities.map(([city, count]) => `
      <button class="city-card" data-city="${escapeHtml(city)}">
        <span class="city-card-header">
          <span class="city-name">${escapeHtml(city)}</span>
          <span class="city-badge">${count}</span>
        </span>
      </button>
    `).join('');
    grid.querySelectorAll('.city-card').forEach(btn => {
      btn.addEventListener('click', () => setCityFilter(btn.dataset.city));
    });
  }

  let activeCity = 'all';
  let searchText = '';

  function renderFilters() {
    const controls = document.getElementById('list-controls');
    controls.innerHTML = '<button class="list-filter-btn active" data-city="all">All</button>' +
      sortedCities.slice(0, 12).map(([city]) => `<button class="list-filter-btn" data-city="${escapeHtml(city)}">${escapeHtml(city)}</button>`).join('');
    controls.querySelectorAll('.list-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setCityFilter(btn.dataset.city));
    });
  }

  function setCityFilter(city) {
    activeCity = city || 'all';
    document.querySelectorAll('.list-filter-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.city === activeCity));
    renderPlaces();
  }

  function renderPlaces() {
    const q = searchText.toLowerCase();
    const filtered = places.filter(p => {
      const hay = [p.name, p.note, p.comment, p._city, p._continent].join(' ').toLowerCase();
      return (activeCity === 'all' || p._city === activeCity) && (!q || hay.includes(q));
    });
    document.getElementById('empty-state').style.display = filtered.length ? 'none' : 'block';
    const list = document.getElementById('places-list');
    list.innerHTML = filtered.map((p) => placeCard(p, places.indexOf(p))).join('');
    list.querySelectorAll('.place-row').forEach(card => {
      card.addEventListener('click', () => openPanel(places[Number(card.dataset.idx)]));
    });
  }

  function openPanel(place) {
    const panel = document.getElementById('side-panel');
    document.getElementById('panel-overlay').classList.add('active');
    panel.classList.add('open');
    document.getElementById('panel-name').textContent = place._displayName;
    document.getElementById('panel-body').innerHTML = `
      <p><strong>City:</strong> ${escapeHtml(place._city)}</p>
      <p><strong>Region:</strong> ${escapeHtml(place._continent)}</p>
      <p>${escapeHtml(place.note || place.comment || 'No note saved.')}</p>
      ${place.mapsUrl ? `<p><a href="${escapeHtml(place.mapsUrl)}" target="_blank" rel="noopener">Open in Google Maps</a></p>` : ''}
    `;
  }

  function closePanel() {
    document.getElementById('panel-overlay').classList.remove('active');
    document.getElementById('side-panel').classList.remove('open');
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('global-search').addEventListener('input', e => {
    searchText = e.target.value;
    renderPlaces();
  });
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);

  renderCities();
  renderFilters();
  renderPlaces();
})();
</script>
</body>
</html>
