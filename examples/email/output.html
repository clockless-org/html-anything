<!doctype html>
<html lang="en" data-ha-style="network-map">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acme x Clockless — Mailbox Snapshot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #a03b00;
  --primary-container: #c94c00;
  --primary-fixed: #ffdbcd;
  --primary-fixed-dim: #ffb597;
  --on-primary: #ffffff;
  --accent-glow: #E8400D;
  --secondary: #d5baff;
  --secondary-container: #7b40e0;
  --tertiary: #4d44e3;
  --accent-cyan: #00D4FF;
  --bg: #fff8f6;
  --surface: #fff8f6;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fbf2ef;
  --surface-container: #f5ece9;
  --surface-container-high: #efe6e3;
  --fg-1: #1e1b19;
  --fg-2: #594138;
  --fg-muted: #8d7166;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.12);
  --outline-variant: #e1bfb2;
  --green: #10b981;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --font-headline: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 20px; --space-2xl: 24px;
  --space-3xl: 32px; --space-4xl: 48px; --space-5xl: 64px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --shadow-sm: 0 1px 2px rgba(30,27,25,0.04);
  --shadow-md: 0 4px 12px rgba(30,27,25,0.08);
  --shadow-lg: 0 8px 24px rgba(30,27,25,0.12);
  --shadow-accent: 0 8px 24px rgba(160,59,0,0.15);
  --gradient-primary: linear-gradient(135deg, #a03b00 0%, #c94c00 100%);
  --gradient-hero: linear-gradient(135deg, #a03b00 0%, #7b40e0 100%);
  --gradient-text: linear-gradient(135deg, #a03b00 0%, #7b40e0 100%);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060B18;
    --surface: #0B1426;
    --surface-container-lowest: #101D35;
    --surface-container-low: #101D35;
    --surface-container: #162544;
    --surface-container-high: #1c2d52;
    --fg-1: #F8FAFC;
    --fg-2: #CBD5E1;
    --fg-muted: #64748B;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --primary: #FF6B35;
    --accent-glow: #00D4FF;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg-1);
  line-height: 1.55;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === NETWORK SHELL === */
.network-shell {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* === TOP BAR === */
.network-topbar {
  background: var(--surface-container-low);
  border-bottom: 1px solid var(--border-strong);
  padding: var(--space-md) var(--space-2xl);
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-shrink: 0;
}

.topbar-logo {
  width: 28px; height: 28px;
  background: var(--gradient-primary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-headline);
  font-weight: 700;
  font-size: 13px;
  color: #fff;
  letter-spacing: -0.02em;
}

.topbar-title {
  font-family: var(--font-headline);
  font-size: 15px;
  font-weight: 600;
  color: var(--fg-1);
  letter-spacing: -0.01em;
}

.topbar-meta {
  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
}

.topbar-search {
  flex: 1;
  min-width: 180px;
  max-width: 320px;
  position: relative;
}

.topbar-search input {
  width: 100%;
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: var(--space-sm) var(--space-lg) var(--space-sm) 36px;
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--fg-1);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.topbar-search input::placeholder { color: var(--fg-muted); }
.topbar-search input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(160,59,0,0.12);
}

.topbar-search .search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--fg-muted);
  pointer-events: none;
  font-size: 14px;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-shrink: 0;
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: var(--space-xs) var(--space-md);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--fg-2);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  display: flex; align-items: center; gap: var(--space-xs);
}

.btn-ghost:hover {
  background: var(--surface-container);
  color: var(--fg-1);
}

/* === MAIN LAYOUT === */
.network-main {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}

@media (min-width: 900px) {
  .network-main {
    grid-template-columns: 340px 1fr;
    min-height: calc(100vh - 56px);
  }
}

@media (min-width: 1200px) {
  .network-main {
    grid-template-columns: 360px 1fr 320px;
  }
}

/* === LEFT PANEL === */
.network-left {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--surface-container-low);
  overflow: hidden;
}

/* === CANVAS AREA === */
.network-canvas-wrap {
  padding: var(--space-lg);
  border-bottom: 1px solid var(--border);
  background: var(--surface-container-lowest);
  position: relative;
}

.canvas-label {
  font-family: var(--font-headline);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: var(--space-sm);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.canvas-label span.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

#networkSvg {
  width: 100%;
  height: 260px;
  display: block;
  border-radius: var(--radius-md);
  background: var(--surface-container);
  overflow: visible;
}

/* === CLUSTER CONTROLS === */
.cluster-controls {
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.cluster-controls-label {
  font-family: var(--font-headline);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

.cluster-chips {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}

.cluster-chip {
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  border: 1px solid var(--border-strong);
  background: var(--surface-container);
  color: var(--fg-2);
  transition: all 0.15s;
  user-select: none;
}

.cluster-chip:hover {
  background: var(--surface-container-high);
  color: var(--fg-1);
}

.cluster-chip.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* === HUB CARDS === */
.hub-cards {
  padding: var(--space-md) var(--space-lg);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  overflow-y: auto;
  flex: 1;
}

.hub-cards-label {
  font-family: var(--font-headline);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: var(--space-xs);
}

.hub-card {
  background: var(--surface-container-lowest);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-md);
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
  display: flex;
  align-items: flex-start;
  gap: var(--space-md);
  animation: fadeSlideIn 0.3s ease both;
}

.hub-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.hub-card.selected {
  border-color: var(--primary);
  background: var(--primary-fixed);
  box-shadow: var(--shadow-accent);
}

@media (prefers-color-scheme: dark) {
  .hub-card.selected {
    background: rgba(255,107,53,0.12);
  }
}

.hub-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-headline);
  font-size: 13px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.hub-info { flex: 1; min-width: 0; }

.hub-name {
  font-family: var(--font-headline);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--fg-1);
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.hub-email {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.hub-stats {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-xs);
  flex-wrap: wrap;
}

.hub-stat {
  font-size: 11px;
  color: var(--fg-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}

.hub-stat strong {
  font-weight: 600;
  color: var(--fg-2);
}

.hub-badge {
  padding: 2px var(--space-sm);
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-headline);
  letter-spacing: 0.03em;
  flex-shrink: 0;
  align-self: flex-start;
}

/* === CENTER: ENTITY INSPECTOR + THREADS === */
.network-center {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.entity-inspector {
  background: var(--surface-container-lowest);
  border-bottom: 1px solid var(--border);
  padding: var(--space-xl) var(--space-2xl);
  animation: fadeSlideIn 0.25s ease both;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.inspector-header {
  display: flex;
  align-items: flex-start;
  gap: var(--space-lg);
  flex-wrap: wrap;
  margin-bottom: var(--space-lg);
}

.inspector-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-headline);
  font-size: 20px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  box-shadow: var(--shadow-accent);
}

.inspector-meta { flex: 1; min-width: 0; }

.inspector-name {
  font-family: var(--font-headline);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--fg-1);
  line-height: 1.2;
}

.inspector-role {
  font-size: 13px;
  color: var(--fg-muted);
  margin-top: var(--space-xs);
  font-family: var(--font-mono);
}

.inspector-domain-tag {
  display: inline-block;
  padding: 2px var(--space-sm);
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-headline);
  color: var(--fg-2);
  margin-top: var(--space-sm);
}

.inspector-kpis {
  display: flex;
  gap: var(--space-lg);
  flex-wrap: wrap;
}

.inspector-kpi {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.inspector-kpi-val {
  font-family: var(--font-headline);
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.inspector-kpi-label {
  font-size: 11px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.inspector-connections {
  margin-top: var(--space-md);
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  align-items: center;
}

.inspector-connections-label {
  font-size: 11px;
  color: var(--fg-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.connection-pill {
  padding: var(--space-xs) var(--space-md);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  color: white;
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.12s;
}
.connection-pill:hover { opacity: 0.85; transform: translateY(-1px); }

/* === LINKED RECORDS === */
.linked-records {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-lg) var(--space-2xl);
}

.linked-records-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-md);
  flex-wrap: wrap;
  gap: var(--space-sm);
}

.linked-records-title {
  font-family: var(--font-headline);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

.record-count-badge {
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  padding: 2px var(--space-sm);
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-2);
  font-family: var(--font-mono);
}

.thread-group {
  margin-bottom: var(--space-2xl);
  animation: fadeSlideIn 0.3s ease both;
}

.thread-group-header {
  display: flex;
  align-items: flex-start;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  background: var(--surface-container-low);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  cursor: pointer;
  transition: background 0.15s;
}

.thread-group-header:hover { background: var(--surface-container); }

.thread-subject {
  font-family: var(--font-headline);
  font-size: 14px;
  font-weight: 600;
  color: var(--fg-1);
  letter-spacing: -0.01em;
  flex: 1;
}

.thread-meta {
  display: flex;
  gap: var(--space-sm);
  align-items: center;
  flex-wrap: wrap;
  margin-top: var(--space-xs);
}

.thread-meta span {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
}

.thread-toggle {
  font-size: 14px;
  color: var(--fg-muted);
  transition: transform 0.2s;
  flex-shrink: 0;
  margin-top: 2px;
}

.thread-toggle.open { transform: rotate(180deg); }

.thread-messages {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  overflow: hidden;
}

.message-row {
  padding: var(--space-md) var(--space-lg);
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  position: relative;
}

.message-row:last-child { border-bottom: none; }

.message-row:hover { background: var(--surface-container-low); }

.message-row.highlighted { background: rgba(160,59,0,0.06); }

@media (prefers-color-scheme: dark) {
  .message-row.highlighted { background: rgba(255,107,53,0.08); }
}

.message-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-wrap: wrap;
  margin-bottom: var(--space-xs);
}

.message-from-avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
  font-family: var(--font-headline);
}

.message-from {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg-1);
  font-family: var(--font-headline);
}

.message-time {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  margin-left: auto;
}

.message-to-line {
  font-size: 11.5px;
  color: var(--fg-muted);
  margin-bottom: var(--space-xs);
}

.message-body {
  font-size: 13px;
  color: var(--fg-2);
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}

.message-body .search-highlight {
  background: rgba(160,59,0,0.2);
  color: var(--primary);
  border-radius: 2px;
  padding: 0 2px;
  font-weight: 600;
}

@media (prefers-color-scheme: dark) {
  .message-body .search-highlight {
    background: rgba(255,107,53,0.25);
    color: #FF6B35;
  }
}

.message-attachments {
  margin-top: var(--space-sm);
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}

.attachment-chip {
  padding: var(--space-xs) var(--space-md);
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  color: var(--fg-2);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

.msg-expand-btn {
  background: none;
  border: none;
  font-size: 11px;
  color: var(--primary);
  cursor: pointer;
  font-weight: 600;
  font-family: var(--font-body);
  padding: var(--space-xs) 0;
  margin-top: var(--space-xs);
  display: block;
}

.message-tags {
  display: flex;
  gap: var(--space-xs);
  margin-top: var(--space-xs);
  flex-wrap: wrap;
}

.msg-tag {
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-headline);
  letter-spacing: 0.04em;
}

.msg-tag.question { background: rgba(245,158,11,0.15); color: #b45309; }
.msg-tag.reply { background: rgba(59,130,246,0.12); color: #1d4ed8; }
.msg-tag.attachment { background: rgba(123,64,224,0.12); color: #7b40e0; }

@media (prefers-color-scheme: dark) {
  .msg-tag.question { color: var(--yellow); }
  .msg-tag.reply { color: #93c5fd; }
  .msg-tag.attachment { color: #d5baff; }
}

/* === RIGHT PANEL === */
.network-right {
  border-left: 1px solid var(--border);
  background: var(--surface-container-low);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-section {
  padding: var(--space-lg);
  border-bottom: 1px solid var(--border);
}

.right-section-title {
  font-family: var(--font-headline);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

/* Edge detail */
.edge-detail {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  animation: fadeSlideIn 0.25s ease both;
}

.edge-row {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-md);
  background: var(--surface-container);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: border-color 0.15s;
}

.edge-row:hover { border-color: var(--primary); }

.edge-avatars {
  display: flex;
  align-items: center;
}

.edge-avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: white;
  font-family: var(--font-headline);
  border: 2px solid var(--surface-container-low);
}

.edge-avatar:nth-child(2) { margin-left: -6px; }

.edge-names {
  flex: 1;
  font-size: 11.5px;
  color: var(--fg-2);
  min-width: 0;
}

.edge-count {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-muted);
  white-space: nowrap;
}

/* Domain bar chart */
.domain-bars {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.domain-bar-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.domain-bar-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.domain-bar-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-2);
  font-family: var(--font-mono);
}

.domain-bar-val {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
}

.domain-bar-track {
  height: 6px;
  background: var(--surface-container);
  border-radius: var(--radius-pill);
  overflow: hidden;
}

.domain-bar-fill {
  height: 100%;
  border-radius: var(--radius-pill);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0;
}

/* Timeline */
.timeline-mini {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  overflow-y: auto;
  max-height: 220px;
}

.timeline-dot-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  font-size: 11.5px;
  color: var(--fg-2);
  cursor: pointer;
  padding: 2px var(--space-xs);
  border-radius: var(--radius-sm);
  transition: background 0.12s;
}

.timeline-dot-row:hover { background: var(--surface-container); }

.timeline-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}

.timeline-dot-date {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-muted);
  white-space: nowrap;
}

.timeline-dot-subject {
  flex: 1;
  font-size: 11.5px;
  color: var(--fg-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* === STATS ROW === */
.stats-strip {
  display: flex;
  gap: var(--space-lg);
  padding: var(--space-md) var(--space-2xl);
  background: var(--surface-container-low);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}

.stat-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  gap: 2px;
}

.stat-chip-val {
  font-family: var(--font-headline);
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
  line-height: 1;
}

.stat-chip-label {
  font-size: 10px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 500;
  white-space: nowrap;
}

.stat-divider {
  width: 1px;
  background: var(--border-strong);
  flex-shrink: 0;
  align-self: stretch;
  margin: var(--space-xs) 0;
}

/* === MOBILE: stacked layout === */
@media (max-width: 899px) {
  .network-main {
    grid-template-columns: 1fr;
  }
  .network-right {
    border-left: none;
    border-top: 1px solid var(--border);
  }
  .network-left {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  #networkSvg { height: 200px; }
  .entity-inspector { padding: var(--space-lg); }
  .linked-records { padding: var(--space-md) var(--space-lg); }
}

/* === SCROLLBARS === */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 3px; }

/* === EMPTY STATE === */
.empty-state {
  padding: var(--space-4xl) var(--space-2xl);
  text-align: center;
  color: var(--fg-muted);
  font-size: 13px;
}

.empty-state-icon { font-size: 28px; margin-bottom: var(--space-sm); }

/* === COPY TOAST === */
.copy-toast {
  position: fixed;
  bottom: var(--space-2xl);
  right: var(--space-2xl);
  background: var(--fg-1);
  color: var(--bg);
  padding: var(--space-sm) var(--space-lg);
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  z-index: 999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}

.copy-toast.show { opacity: 1; transform: translateY(0); }

/* === SELECTED NODE PULSE === */
@keyframes nodeSelect {
  0% { r: 14; opacity: 0.8; }
  50% { r: 18; opacity: 0.4; }
  100% { r: 14; opacity: 0.8; }
}

.node-halo { animation: nodeSelect 1.5s ease-in-out infinite; }

/* === MOBILE TAB BAR === */
.mobile-tabs {
  display: none;
}

@media (max-width: 899px) {
  .mobile-tabs {
    display: flex;
    background: var(--surface-container-low);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 56px;
    z-index: 90;
  }

  .mobile-tab {
    flex: 1;
    padding: var(--space-sm) var(--space-xs);
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-headline);
    color: var(--fg-muted);
    border: none;
    background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .mobile-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  .mobile-panel { display: none; }
  .mobile-panel.active { display: flex; flex-direction: column; }
}

@media (min-width: 900px) {
  .mobile-panel { display: flex !important; flex-direction: column; }
  .network-left, .network-center, .network-right { display: flex !important; }
}

/* === THREAD COLLAPSED === */
.thread-messages.collapsed { display: none; }

/* === SEARCH NO RESULTS === */
.no-results {
  padding: var(--space-3xl) var(--space-2xl);
  text-align: center;
  color: var(--fg-muted);
  font-size: 13px;
}

<script>
(function() {
  // ============================================================
  // DATA HELPERS
  // ============================================================
  const meta = DATA;
  const senders = meta.topSenders || [];
  const domains = meta.topDomains || [];

  // Gather all messages from first + last + longestThread.sample
  function gatherMessages() {
    const seen = new Set();
    const msgs = [];
    const addMsg = m => {
      if (!seen.has(m.id)) { seen.add(m.id); msgs.push(m); }
    };
    (meta.first || []).forEach(addMsg);
    (meta.last || []).forEach(addMsg);
    if (meta.longestThread && meta.longestThread.sample) {
      meta.longestThread.sample.forEach(addMsg);
    }
    return msgs.sort((a, b) => a.tsEpoch - b.tsEpoch);
  }

  // Gather all threads
  function buildThreads(msgs) {
    const map = {};
    msgs.forEach(m => {
      if (!map[m.threadId]) {
        map[m.threadId] = { id: m.threadId, subject: m.subject, messages: [], participants: new Set() };
      }
      map[m.threadId].messages.push(m);
      map[m.threadId].participants.add(m.from.email);
      (m.to || []).forEach(p => map[m.threadId].participants.add(p.email));
      (m.cc || []).forEach(p => map[m.threadId].participants.add(p.email));
    });
    Object.values(map).forEach(t => {
      t.participants = Array.from(t.participants);
      t.messages.sort((a, b) => a.tsEpoch - b.tsEpoch);
    });
    return Object.values(map).sort((a, b) => a.messages[0].tsEpoch - b.messages[0].tsEpoch);
  }

  const allMessages = gatherMessages();
  const allThreads = buildThreads(allMessages);

  // ============================================================
  // COLORS
  // ============================================================
  const PALETTE = [
    '#a03b00', '#7b40e0', '#4d44e3', '#10b981', '#3b82f6',
    '#f59e0b', '#ef4444', '#00D4FF', '#e8400d', '#c94c00'
  ];

  const senderColorMap = {};
  senders.forEach((s, i) => {
    senderColorMap[s.email] = PALETTE[i % PALETTE.length];
  });

  function emailColor(email) {
    return senderColorMap[email] || PALETTE[senders.length % PALETTE.length];
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(' ');
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    return parts[0].slice(0, 2).toUpperCase();
  }

  function nameByEmail(email) {
    const s = senders.find(x => x.email === email);
    if (s) return s.name;
    // search messages
    for (const m of allMessages) {
      if (m.from.email === email) return m.from.name;
      for (const r of [...(m.to||[]), ...(m.cc||[])]) {
        if (r.email === email) return r.name;
      }
    }
    return email.split('@')[0];
  }

  const domainColors = { 'clockless.ai': '#a03b00', 'northstack.dev': '#7b40e0', 'acme.co': '#10b981' };

  function domainColor(d) {
    return domainColors[d] || '#3b82f6';
  }

  // ============================================================
  // STATS STRIP
  // ============================================================
  function renderStats() {
    const strip = document.getElementById('statsStrip');
    const stats = [
      { val: meta.messageCount, label: 'Messages' },
      { val: meta.threadCount, label: 'Threads' },
      { val: meta.senderCount, label: 'Senders' },
      { val: meta.domainCount, label: 'Domains' },
      { val: meta.attachmentCount, label: 'Attachments' },
      { val: meta.dateRange, label: 'Date Range', mono: true },
    ];
    strip.innerHTML = stats.map((s, i) => `
      ${i > 0 ? '<div class="stat-divider"></div>' : ''}
      <div class="stat-chip">
        <div class="stat-chip-val${s.mono ? '" style="font-size:12px;font-family:var(--font-mono)' : ''}">${s.val}</div>
        <div class="stat-chip-label">${s.label}</div>
      </div>
    `).join('');
  }

  // ============================================================
  // NETWORK SVG
  // ============================================================
  let selectedNode = null;
  let currentGroup = 'all';

  function buildGraphData(groupMode) {
    // Nodes: senders (with count), optionally domains
    // Edges: co-participation in threads
    const nodes = senders.map(s => ({
      id: s.email, name: s.name, email: s.email, count: s.count,
      domain: s.domain, color: emailColor(s.email),
      group: groupMode === 'domain' ? s.domain : (groupMode === 'thread' ? getMainThread(s.email) : 'all')
    }));

    // Build edges from thread co-participation
    const edgeMap = {};
    allThreads.forEach(t => {
      const ps = t.participants.filter(e => senders.some(s => s.email === e));
      for (let i = 0; i < ps.length; i++) {
        for (let j = i+1; j < ps.length; j++) {
          const key = [ps[i], ps[j]].sort().join('||');
          edgeMap[key] = (edgeMap[key] || 0) + 1;
        }
      }
    });

    const edges = Object.entries(edgeMap).map(([key, count]) => {
      const [a, b] = key.split('||');
      return { source: a, target: b, count };
    });

    return { nodes, edges };
  }

  function getMainThread(email) {
    for (const t of allThreads) {
      if (t.participants.includes(email)) return t.id;
    }
    return 'none';
  }

  function layoutNodes(nodes, groupMode, w, h) {
    const pad = 40;
    if (groupMode === 'domain') {
      const domGroups = {};
      nodes.forEach(n => {
        if (!domGroups[n.domain]) domGroups[n.domain] = [];
        domGroups[n.domain].push(n);
      });
      const dkeys = Object.keys(domGroups);
      const cols = dkeys.length;
      dkeys.forEach((dk, di) => {
        const cx = pad + (di + 0.5) * ((w - 2*pad) / cols);
        domGroups[dk].forEach((n, ni) => {
          const total = domGroups[dk].length;
          const angle = (ni / total) * 2 * Math.PI - Math.PI/2;
          const r = total === 1 ? 0 : 28;
          n.x = cx + r * Math.cos(angle);
          n.y = h/2 + r * Math.sin(angle) * 0.7;
        });
      });
    } else if (groupMode === 'thread') {
      const tGroups = {};
      nodes.forEach(n => {
        const tg = getMainThread(n.email);
        if (!tGroups[tg]) tGroups[tg] = [];
        tGroups[tg].push(n);
      });
      const tkeys = Object.keys(tGroups);
      tkeys.forEach((tk, ti) => {
        const cx = pad + (ti + 0.5) * ((w - 2*pad) / tkeys.length);
        tGroups[tk].forEach((n, ni) => {
          const total = tGroups[tk].length;
          const angle = (ni / total) * 2 * Math.PI - Math.PI/2;
          const r = total === 1 ? 0 : 30;
          n.x = cx + r * Math.cos(angle);
          n.y = h/2 + r * Math.sin(angle) * 0.7;
        });
      });
    } else {
      // Circular with central hub = most messages
      const sorted = [...nodes].sort((a, b) => b.count - a.count);
      const cx = w / 2, cy = h / 2;
      sorted[0].x = cx; sorted[0].y = cy;
      const rest = sorted.slice(1);
      rest.forEach((n, i) => {
        const angle = (i / rest.length) * 2 * Math.PI - Math.PI/2;
        const r = Math.min(w, h) * 0.33;
        n.x = cx + r * Math.cos(angle);
        n.y = cy + r * Math.sin(angle);
      });
    }
    return nodes;
  }

  function renderNetwork(groupMode) {
    const svg = document.getElementById('networkSvg');
    const vb = svg.viewBox.baseVal;
    const W = vb.width || 300, H = vb.height || 240;

    const { nodes, edges } = buildGraphData(groupMode);
    layoutNodes(nodes, groupMode, W, H);

    const nodeById = {};
    nodes.forEach(n => nodeById[n.id] = n);

    let html = '';

    // Group rings (domain mode)
    if (groupMode === 'domain') {
      const domGroups = {};
      nodes.forEach(n => {
        if (!domGroups[n.domain]) domGroups[n.domain] = [];
        domGroups[n.domain].push(n);
      });
      Object.entries(domGroups).forEach(([dk, dns]) => {
        if (dns.length <= 1) return;
        const cx = dns.reduce((s, n) => s + n.x, 0) / dns.length;
        const cy = dns.reduce((s, n) => s + n.y, 0) / dns.length;
        const maxR = Math.max(...dns.map(n => Math.hypot(n.x - cx, n.y - cy))) + 22;
        html += `<ellipse cx="${cx}" cy="${cy}" rx="${maxR}" ry="${maxR * 0.75}"
          fill="${domainColor(dk)}14" stroke="${domainColor(dk)}30" stroke-width="1"
          stroke-dasharray="4,3" rx="${maxR}" />`;
      });
    }

    // Edges
    edges.forEach(e => {
      const a = nodeById[e.source], b = nodeById[e.target];
      if (!a || !b) return;
      const isActive = !selectedNode || selectedNode === e.source || selectedNode === e.target;
      const opacity = isActive ? 0.45 : 0.1;
      const w = 1 + e.count * 0.5;
      html += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
        stroke="${a.color}" stroke-width="${w}" stroke-opacity="${opacity}"
        class="svg-edge" data-source="${e.source}" data-target="${e.target}" data-count="${e.count}"
        style="cursor:pointer;" />`;
    });

    // Nodes
    nodes.forEach(n => {
      const isSelected = selectedNode === n.id;
      const isConnected = !selectedNode || selectedNode === n.id ||
        edges.some(e => (e.source === n.id || e.target === n.id) && (e.source === selectedNode || e.target === selectedNode));
      const r = 10 + n.count * 2.5;
      const opacity = isConnected ? 1 : 0.3;
      const labelY = n.y + r + 12;

      if (isSelected) {
        html += `<circle cx="${n.x}" cy="${n.y}" r="${r + 6}" fill="${n.color}" fill-opacity="0.18" class="node-halo" />`;
      }

      html += `<circle cx="${n.x}" cy="${n.y}" r="${r}"
        fill="${n.color}" fill-opacity="${opacity}"
        stroke="${isSelected ? '#fff' : n.color}" stroke-width="${isSelected ? 2.5 : 1.5}"
        stroke-opacity="${opacity}"
        class="svg-node" data-email="${n.id}"
        style="cursor:pointer;filter:${isSelected ? 'drop-shadow(0 2px 6px ' + n.color + '60)' : 'none'}" />`;

      html += `<text x="${n.x}" y="${n.y + 4}"
        text-anchor="middle" font-family="Space Grotesk, sans-serif"
        font-size="9" font-weight="700" fill="white" fill-opacity="${opacity}"
        style="pointer-events:none;user-select:none;">${initials(n.name)}</text>`;

      html += `<text x="${n.x}" y="${labelY}"
        text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif"
        font-size="8.5" fill="${isSelected ? n.color : 'var(--fg-muted)'}"
        fill-opacity="${isConnected ? 1 : 0.4}"
        style="pointer-events:none;user-select:none;">${n.name.split(' ')[0]}</text>`;
    });

    svg.innerHTML = html;

    // Bind events
    svg.querySelectorAll('.svg-node').forEach(el => {
      el.addEventListener('click', (e) => {
        const email = el.dataset.email;
        selectNode(email === selectedNode ? null : email);
      });
    });

    svg.querySelectorAll('.svg-edge').forEach(el => {
      el.addEventListener('mouseenter', function() {
        const s = nameByEmail(this.dataset.source);
        const t = nameByEmail(this.dataset.target);
        this.setAttribute('stroke-opacity', '0.85');
        this.setAttribute('stroke-width', parseFloat(this.getAttribute('stroke-width')) + 1);
      });
      el.addEventListener('mouseleave', function() {
        renderNetwork(currentGroup);
      });
    });
  }

  // ============================================================
  // HUB CARDS
  // ============================================================
  function renderHubCards(filter) {
    const list = document.getElementById('hubCardsList');
    const filteredSenders = filter ?
      senders.filter(s => s.email.includes(filter) || s.name.toLowerCase().includes(filter.toLowerCase())) :
      senders;

    if (filteredSenders.length === 0) {
      list.innerHTML = '<div class="empty-state"><div>No matching senders</div></div>';
      return;
    }

    list.innerHTML = filteredSenders.map((s, i) => {
      const isSelected = selectedNode === s.email;
      const threadCount = allThreads.filter(t => t.participants.includes(s.email)).length;
      const domainTag = getDomainTagHtml(s.domain);

      return `<div class="hub-card ${isSelected ? 'selected' : ''}"
        data-email="${s.email}"
        style="animation-delay:${i * 60}ms">
        <div class="hub-avatar" style="background:${emailColor(s.email)}">${initials(s.name)}</div>
        <div class="hub-info">
          <div class="hub-name">${s.name}</div>
          <div class="hub-email">${s.email}</div>
          <div class="hub-stats">
            <div class="hub-stat"><strong>${s.count}</strong> msgs</div>
            <div class="hub-stat"><strong>${threadCount}</strong> threads</div>
          </div>
        </div>
        ${domainTag}
      </div>`;
    }).join('');

    list.querySelectorAll('.hub-card').forEach(card => {
      card.addEventListener('click', () => {
        const email = card.dataset.email;
        selectNode(email === selectedNode ? null : email);
        if (window.innerWidth <= 899) switchPanel('center');
      });
    });
  }

  function getDomainTagHtml(domain) {
    const color = domainColor(domain);
    const label = domain.split('.')[0];
    const bg = color + '22';
    return `<div class="hub-badge" style="background:${bg};color:${color};border:1px solid ${color}40">${label}</div>`;
  }
