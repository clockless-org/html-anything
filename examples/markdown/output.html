<style>
:root {
  --primary: #a03b00;
  --primary-container: #c94c00;
  --primary-fixed: #ffdbcd;
  --primary-fixed-dim: #ffb597;
  --on-primary: #ffffff;
  --accent-glow: #E8400D;
  --secondary: #d5baff;
  --secondary-container: #7b40e0;
  --tertiary: #4d44e3;
  --accent-cyan: #00D4FF;
  --bg: #fff8f6;
  --surface: #fff8f6;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fbf2ef;
  --surface-container: #f5ece9;
  --surface-container-high: #efe6e3;
  --fg-1: #1e1b19;
  --fg-2: #594138;
  --fg-muted: #8d7166;
  --border: rgba(0, 0, 0, 0.06);
  --border-strong: rgba(0, 0, 0, 0.12);
  --outline-variant: #e1bfb2;
  --green: #10b981;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --font-headline: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 20px; --space-2xl: 24px;
  --space-3xl: 32px; --space-4xl: 48px; --space-5xl: 64px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --shadow-sm: 0 1px 2px rgba(30, 27, 25, 0.04);
  --shadow-md: 0 4px 12px rgba(30, 27, 25, 0.08);
  --shadow-lg: 0 8px 24px rgba(30, 27, 25, 0.12);
  --shadow-accent: 0 8px 24px rgba(160, 59, 0, 0.15);
  --gradient-primary: linear-gradient(135deg, #a03b00 0%, #c94c00 100%);
  --gradient-hero: linear-gradient(135deg, #a03b00 0%, #7b40e0 100%);
  --gradient-text: linear-gradient(135deg, #a03b00 0%, #7b40e0 100%);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060B18;
    --surface: #0B1426;
    --surface-container-lowest: #101D35;
    --surface-container-low: #101D35;
    --surface-container: #162544;
    --surface-container-high: #1c2d52;
    --fg-1: #F8FAFC;
    --fg-2: #CBD5E1;
    --fg-muted: #64748B;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --primary: #FF6B35;
    --accent-glow: #00D4FF;
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
    --outline-variant: #2a3a5c;
    --primary-fixed: #1c2d52;
    --primary-fixed-dim: #2a3a5c;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg-1);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ── */
.page-wrapper {
  display: grid;
  grid-template-columns: 1fr;
  grid-template-areas: "header" "controls" "body" "footer";
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-lg);
  gap: var(--space-2xl);
}

@media (min-width: 900px) {
  .page-wrapper {
    grid-template-columns: 240px 1fr;
    grid-template-areas:
      "header  header"
      "controls controls"
      "toc     body"
      "footer  footer";
    padding: var(--space-4xl) var(--space-3xl);
    gap: var(--space-3xl);
  }
}

/* ── Header ── */
.site-header {
  grid-area: header;
  padding: var(--space-4xl) var(--space-2xl) var(--space-3xl);
  background: var(--surface-container-low);
  border-radius: var(--radius-2xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.site-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--gradient-hero);
  border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
}

.header-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-xl);
}

.meta-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  padding: var(--space-xs) var(--space-sm);
  border-radius: var(--radius-pill);
  letter-spacing: 0.03em;
}

.doc-title {
  font-family: var(--font-headline);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  background: var(--gradient-text);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: var(--space-2xl);
}

.tldr {
  background: var(--surface-container);
  border: 1px solid var(--outline-variant);
  border-radius: var(--radius-lg);
  padding: var(--space-xl);
  margin-top: var(--space-xl);
}

.tldr-label {
  font-family: var(--font-headline);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: var(--space-md);
}

.tldr-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.tldr-list li {
  display: flex;
  align-items: flex-start;
  gap: var(--space-md);
  font-size: 14px;
  color: var(--fg-2);
  line-height: 1.5;
}

.tldr-list li::before {
  content: '';
  display: block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
  margin-top: 6px;
  flex-shrink: 0;
}

/* ── Controls bar ── */
.controls-bar {
  grid-area: controls;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-sm);
}

.search-wrapper {
  flex: 1;
  min-width: 200px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: var(--space-md);
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-muted);
  pointer-events: none;
  font-size: 14px;
}

#searchInput {
  width: 100%;
  padding: var(--space-sm) var(--space-md) var(--space-sm) 36px;
  font-family: var(--font-body);
  font-size: 14px;
  background: var(--surface-container-low);
  color: var(--fg-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-pill);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

#searchInput:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(160, 59, 0, 0.12);
}

#searchInput::placeholder { color: var(--fg-muted); }

.search-count {
  position: absolute;
  right: var(--space-md);
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) var(--space-lg);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border-strong);
  background: var(--surface-container-low);
  color: var(--fg-2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover {
  background: var(--surface-container);
  color: var(--fg-1);
  border-color: var(--primary);
}

.btn-primary {
  background: var(--gradient-primary);
  color: var(--on-primary);
  border-color: transparent;
}

.btn-primary:hover {
  opacity: 0.9;
  color: var(--on-primary);
  border-color: transparent;
}

.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── TOC ── */
.toc-panel {
  grid-area: toc;
  display: none;
}

@media (min-width: 900px) {
  .toc-panel { display: block; }
}

.toc-sticky {
  position: sticky;
  top: var(--space-2xl);
}

.toc-header {
  font-family: var(--font-headline);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-muted);
  margin-bottom: var(--space-md);
  padding-left: var(--space-md);
}

.toc-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.toc-item a {
  display: block;
  padding: var(--space-xs) var(--space-md);
  font-size: 13px;
  color: var(--fg-muted);
  text-decoration: none;
  border-radius: var(--radius-sm);
  border-left: 2px solid transparent;
  transition: all 0.15s;
  line-height: 1.4;
}

.toc-item a:hover {
  color: var(--fg-1);
  background: var(--surface-container);
  border-left-color: var(--outline-variant);
}

.toc-item.active a {
  color: var(--primary);
  background: var(--primary-fixed);
  border-left-color: var(--primary);
  font-weight: 600;
}

.toc-item.level-3 a { padding-left: var(--space-2xl); font-size: 12px; }

.toc-summary {
  font-size: 11px;
  color: var(--fg-muted);
  line-height: 1.4;
  margin-top: 2px;
  display: none;
}

/* Mobile jump-to */
.mobile-toc {
  display: block;
}

@media (min-width: 900px) {
  .mobile-toc { display: none; }
}

.mobile-toc select {
  width: 100%;
  padding: var(--space-sm) var(--space-md);
  font-family: var(--font-body);
  font-size: 14px;
  background: var(--surface-container-low);
  color: var(--fg-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  outline: none;
  cursor: pointer;
}

/* ── Body / Article ── */
.article-area {
  grid-area: body;
  min-width: 0;
}

.article-body {
  max-width: 720px;
}

/* Markdown rendered styles */
.article-body h1, .article-body h2, .article-body h3,
.article-body h4, .article-body h5, .article-body h6 {
  font-family: var(--font-headline);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--fg-1);
  scroll-margin-top: var(--space-3xl);
}

.article-body h1 { font-size: clamp(1.5rem, 3.5vw, 2rem); margin: var(--space-4xl) 0 var(--space-lg); line-height: 1.2; }
.article-body h2 { font-size: clamp(1.2rem, 2.5vw, 1.4rem); margin: var(--space-4xl) 0 var(--space-lg); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--border); color: var(--fg-1); }
.article-body h3 { font-size: 1.1rem; margin: var(--space-3xl) 0 var(--space-md); color: var(--fg-2); }
.article-body h4 { font-size: 1rem; margin: var(--space-2xl) 0 var(--space-md); }

.article-body p { margin-bottom: var(--space-xl); color: var(--fg-2); line-height: 1.7; font-size: 15.5px; }

.article-body a { color: var(--primary); text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--outline-variant); }
.article-body a:hover { text-decoration-color: var(--primary); }

.article-body ul, .article-body ol {
  margin: 0 0 var(--space-xl) var(--space-2xl);
  color: var(--fg-2);
  font-size: 15.5px;
  line-height: 1.7;
}

.article-body li { margin-bottom: var(--space-sm); }
.article-body li strong { color: var(--fg-1); }

.article-body blockquote {
  margin: var(--space-3xl) 0;
  padding: var(--space-xl) var(--space-2xl);
  background: var(--primary-fixed);
  border-left: 4px solid var(--primary);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  font-style: italic;
  color: var(--fg-1);
  font-size: 16px;
  line-height: 1.7;
  box-shadow: var(--shadow-sm);
}

@media (prefers-color-scheme: dark) {
  .article-body blockquote { background: var(--surface-container); }
}

.article-body code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--surface-container);
  border: 1px solid var(--border-strong);
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  color: var(--primary);
}

.article-body pre {
  background: var(--surface-container-low);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: var(--space-xl);
  overflow-x: auto;
  margin-bottom: var(--space-xl);
}

.article-body pre code {
  background: none;
  border: none;
  padding: 0;
  color: var(--fg-2);
  font-size: 13px;
}

.article-body strong { color: var(--fg-1); font-weight: 600; }
.article-body em { color: var(--fg-2); }

/* ── Pull Quotes ── */
.pull-quotes {
  display: flex;
  flex-direction: column;
  gap: var(--space-lg);
  margin: var(--space-3xl) 0;
}

.pull-quote {
  position: relative;
  background: var(--surface-container);
  border-radius: var(--radius-xl);
  padding: var(--space-2xl) var(--space-2xl) var(--space-2xl) var(--space-4xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
}

.pull-quote::before {
  content: '"';
  position: absolute;
  left: var(--space-lg);
  top: var(--space-md);
  font-size: 3.5rem;
  line-height: 1;
  color: var(--primary);
  font-family: Georgia, serif;
  opacity: 0.6;
}

.pull-quote p {
  font-style: italic;
  font-size: 15px;
  color: var(--fg-1);
  line-height: 1.65;
  margin: 0;
}

/* ── Search highlight ── */
mark.search-hl {
  background: rgba(160, 59, 0, 0.18);
  color: inherit;
  border-radius: 2px;
  padding: 0 2px;
}

@media (prefers-color-scheme: dark) {
  mark.search-hl { background: rgba(255, 107, 53, 0.3); }
}

/* ── Footer ── */
.site-footer {
  grid-area: footer;
  border-top: 1px solid var(--border);
  padding: var(--space-2xl) 0;
  text-align: center;
  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: var(--space-2xl);
  right: var(--space-2xl);
  background: var(--fg-1);
  color: var(--bg);
  padding: var(--space-sm) var(--space-xl);
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 1000;
  box-shadow: var(--shadow-lg);
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── Print ── */
@media print {
  .controls-bar, .toc-panel, .mobile-toc, .site-footer { display: none !important; }
  .page-wrapper { display: block; padding: 0; }
  .site-header { box-shadow: none; border: none; page-break-after: avoid; }
  .article-body { max-width: 100%; }
  .article-body a { color: inherit; }
  body { background: white; color: black; }
}

/* First h1 in article — suppress if same as page title shown in header */
.article-body > h1:first-child { display: none; }
</style>

<script>const DATA = {"markdown":"# The Long, Slow, Inevitable Death of the PDF\n\nThe PDF is the universal output format. Every report, every spec, every\ncontract, every menu, every receipt eventually becomes one. It is the\ntext-based equivalent of a fax: hated, ubiquitous, immortal.\n\nThis is mostly because nothing better has shown up. Word documents are\nproprietary. Markdown is too plain. HTML is too varied. So the PDF\nendures, like a cockroach with a \"Save As\" button.\n\n## Why PDFs persist\n\nThere are three real reasons:\n\n1. **Faithful rendering.** A PDF looks the same on every device, every\n   printer, every reader. This was a miracle in 1993 and is still useful.\n2. **Portability.** One file, one click, one envelope.\n3. **Print-to-screen consistency.** Even if you never print it, it\n   *implies* a page, which implies a finished thing, which implies trust.\n\nThe first two have alternatives that finally work. The third is harder\nto reason about, but it might be where the PDF actually lives.\n\n## What's broken about it\n\nA PDF is a closed format pretending to be an open one. The text inside\nis often hostile to copy-paste. Tables shatter on selection. Forms are\nhieroglyphics. Search works, but only barely. On a phone, a PDF asks\nyou to *zoom into a thing designed for paper*, which is the digital\nequivalent of being handed a folded map and a compass.\n\n> The PDF is the only format I know of that simultaneously feels like a\n> precious artifact and a hostile environment.\n\n## What might replace it\n\nThe candidates have always existed. They just haven't won.\n\n### HTML\n\nA single self-contained `.html` file can hold structure, color,\nillustrations, code, animation, search, and interactivity. It opens\nin any browser. It does not need an app. It is searchable, copyable,\nmobile-responsive when written correctly, and it is the format that\nagents already produce for the web.\n\nThe downside has always been that authoring was hard. That is what\njust changed.\n\n### Markdown\n\nLighter than HTML, with the same portability. But markdown has no\nvisual identity. A 100-page PDF and a 100-page markdown file feel\nnothing alike. Markdown is a working draft; PDF is a finished thing.\nThis is sociology more than technology.\n\n### Notion / Slabs / Walling / Capacities\n\nBeautiful, but locked. You don't have the file. You have a link, and\nthe link only works while you're paying.\n\n## So what changes now\n\nThe shape of the answer is: **make HTML feel finished**. Authoring used\nto be the bottleneck — a designer to lay out the typography, an engineer\nto wire the interactions. Both of those are now things an agent can do\nin a single prompt.\n\nA PDF says \"this document is final.\" An HTML file produced by an agent\nthat read your specs, your data, your repo, your meeting notes, *and\nturned them into a single file with search, navigation, dark mode and\nmobile responsiveness* says \"this document is alive.\"\n\nThat second one is more useful.\n\n---\n\n## Footnotes\n\n- The single-self-contained-file thing matters. Multi-file SPAs are\n  not portable; you can't email them.\n- Search inside the HTML file is non-negotiable. The number of times\n  per week I `Cmd-F` inside a long document is the reason any reading\n  experience without it feels broken.\n- Mobile responsive is non-negotiable. People will read what you sent\n  on a phone, in a hurry, between meetings. If they can't, they don't.\n\nThe PDF is going to outlive every single one of us. But it shouldn't\nhave to.\n","headings":[{"level":1,"text":"The Long, Slow, Inevitable Death of the PDF"},{"level":2,"text":"Why PDFs persist"},{"level":2,"text":"What's broken about it"},{"level":2,"text":"What might replace it"},{"level":3,"text":"HTML"},{"level":3,"text":"Markdown"},{"level":3,"text":"Notion / Slabs / Walling / Capacities"},{"level":2,"text":"So what changes now"},{"level":2,"text":"Footnotes"}],"sourceFile":"input.md","sizeBytes":3429,"wordCount" // ─── Tiny Markdown Parser ───────────────────────────────────────────────────
function parseMarkdown(md) {
  const lines = md.split('\n');
  let html = '';
  let i = 0;

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function slugify(text) {
    return text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  }

  function inlineRender(text) {
    // bold+italic
    text = text.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // bold
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__(.*?)__/g, '<strong>$1</strong>');
    // italic
    text = text.replace(/\*(.*?)\*/g, '<em>$1</em>');
    text = text.replace(/_(.*?)_/g, '<em>$1</em>');
    // inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // auto links
    text = text.replace(/(?<![">])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    return text;
  }

  function parseList(startI, ordered) {
    let result = ordered ? '<ol>' : '<ul>';
    const baseIndent = lines[startI].match(/^(\s*)/)[1].length;
    while (startI < lines.length) {
      const line = lines[startI];
      const m = line.match(/^(\s*)(?:\d+\.|[-*+])\s+(.*)/);
      if (!m) break;
      const indent = m[1].length;
      if (indent < baseIndent) break;
      if (indent === baseIndent) {
        result += '<li>' + inlineRender(escapeHtml(m[2])) + '</li>';
        startI++;
      } else {
        // nested — simple: just include inline
        result += '<li>' + inlineRender(escapeHtml(m[2])) + '</li>';
        startI++;
      }
    }
    result += ordered ? '</ol>' : '</ul>';
    i = startI;
    return result;
  }

  while (i < lines.length) {
    const line = lines[i];

    // Fenced code block
    if (line.match(/^```/)) {
      const lang = line.slice(3).trim();
      i++;
      let code = '';
      while (i < lines.length && !lines[i].match(/^```/)) {
        code += escapeHtml(lines[i]) + '\n';
        i++;
      }
      i++; // closing ```
      html += `<pre><code class="lang-${escapeHtml(lang)}">${code}</code></pre>`;
      continue;
    }

    // Headings
    const hm = line.match(/^(#{1,6})\s+(.*)/);
    if (hm) {
      const level = hm[1].length;
      const text = hm[2].replace(/\s*#+\s*$/, '');
      const slug = slugify(text);
      html += `<h${level} id="${slug}">${inlineRender(escapeHtml(text))}</h${level}>`;
      i++;
      continue;
    }

    // Blockquote
    if (line.match(/^>\s?/)) {
      let bqContent = '';
      while (i < lines.length && lines[i].match(/^>\s?/)) {
        bqContent += lines[i].replace(/^>\s?/, '') + ' ';
        i++;
      }
      html += `<blockquote><p>${inlineRender(escapeHtml(bqContent.trim()))}</p></blockquote>`;
      continue;
    }

    // Horizontal rule
    if (line.match(/^[-*_]{3,}$/)) {
      html += '<hr>';
      i++;
      continue;
    }

    // Ordered list
    if (line.match(/^\s*\d+\.\s/)) {
      const saved = i;
      const listHtml = parseList(i, true);
      if (i === saved) i++;
      html += listHtml;
      continue;
    }

    // Unordered list
    if (line.match(/^\s*[-*+]\s/)) {
      const saved = i;
      const listHtml = parseList(i, false);
      if (i === saved) i++;
      html += listHtml;
      continue;
    }

    // Blank line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph — collect until blank or block element
    let paraLines = [];
    while (i < lines.length &&
           lines[i].trim() !== '' &&
           !lines[i].match(/^#{1,6}\s/) &&
           !lines[i].match(/^>\s?/) &&
           !lines[i].match(/^```/) &&
           !lines[i].match(/^\s*[-*+]\s/) &&
           !lines[i].match(/^\s*\d+\.\s/) &&
           !lines[i].match(/^[-*_]{3,}$/)) {
      paraLines.push(lines[i]);
      i++;
    }
    if (paraLines.length) {
      html += `<p>${inlineRender(escapeHtml(paraLines.join(' ')))}</p>`;
    }
  }
  return html;
}

// ─── Slug helper ────────────────────────────────────────────────────────────
function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

    const div = document.createElement('div');
    div.className = 'pull-quote';
    div.innerHTML = `<p>${q}</p>`;
    pullQuotesEl.appendChild(div);
  });

  // Render markdown
  const articleBody = document.getElementById('articleBody');
  articleBody.innerHTML = parseMarkdown(md);

  // Build TOC
  const tocList = document.getElementById('tocList');
  const mobileToc = document.getElementById('mobileToc');
  const tocSummaries = {
    'why-pdfs-persist': 'Three core reasons PDFs stuck around for 30+ years.',
    'what-s-broken-about-it': 'Mobile hostility, copy-paste failures, and format rot.',
    'what-might-replace-it': 'Survey of HTML, Markdown, and collaborative tools.',
    'html': "The web's own format, now more portable than ever.",
    'markdown': 'Plain text with just enough structure.',
    'notion-slabs-walling-capacities': 'Cloud-native, collaborative document platforms.',
    'so-what-changes-now': 'How AI and URLs are quietly ending the PDF era.',
    'footnotes': 'References and supplementary notes.',
  };

  headings.forEach(h => {
    if (h.level === 1) return; // skip main title
    const slug = slugify(h.text);
    const li = document.createElement('li');
    li.className = `toc-item level-${h.level}`;
    li.dataset.slug = slug;
    li.innerHTML = `<a href="#${slug}">${h.text}</a>`;
    tocList.appendChild(li);

    const opt = document.createElement('option');
    opt.value = '#' + slug;
    opt.textContent = (h.level === 3 ? '  › ' : '') + h.text;
    mobileToc.appendChild(opt);
  });

  // Active TOC on scroll
  const headingEls = articleBody.querySelectorAll('h1,h2,h3,h4,h5,h6');
  const tocItems = tocList.querySelectorAll('.toc-item');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocItems.forEach(item => item.classList.remove('active'));
        const active = tocList.querySelector(`[data-slug="${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-10% 0px -70% 0px', threshold: 0 });
  headingEls.forEach(el => observer.observe(el));

  // Footer
  document.getElementById('siteFooter').textContent =
    `${DATA.meta?.sourceFile || 'document'} · ${DATA.sizeBytes || DATA.meta?.sizeBytes || 0} bytes · rendered by html-anything`;

  // ─── Search ──────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('searchInput');
  const searchCount = document.getElementById('searchCount');
  let originalHTML = articleBody.innerHTML;

  searchInput.addEventListener('input', function() {
    const q = this.value.trim();
    if (!q) {
      articleBody.innerHTML = originalHTML;
      searchCount.textContent = '';
      return;
    }
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    let tempDiv = document.createElement('div');
    tempDiv.innerHTML = originalHTML;
    let count = 0;
    function highlightNode(node) {
      if (node.nodeType === 3) {
        const text = node.textContent;
        const parts = text.split(regex);
        if (parts.length > 1) {
          const frag = document.createDocumentFragment();
          parts.forEach(part => {
            if (regex.test(part)) {
              const mark = document.createElement('mark');
              mark.className = 'search-hl';
              mark.textContent = part;
              frag.appendChild(mark);
              count++;
              regex.lastIndex = 0;
            } else {
              frag.appendChild(document.createTextNode(part));
            }
          });
          node.parentNode.replaceChild(frag, node);
        }
      } else if (node.nodeType === 1 && node.nodeName !== 'SCRIPT' && node.nodeName !== 'STYLE') {
        Array.from(node.childNodes).forEach(highlightNode);
      }
    }
    highlightNode(tempDiv);
    articleBody.innerHTML = tempDiv.innerHTML;
    searchCount.textContent = count > 0 ? count + ' match' + (count !== 1 ? 'es' : '') : 'no matches';
    if (count > 0) {
      const first = articleBody.querySelector('mark.search-hl');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  // Keyboard shortcut Cmd/Ctrl+F
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

  // ─── Copy Markdown ────────────────────────────────────────────────────────
  document.getElementById('copyMdBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(DATA.markdown || '').then(() => showToast('Markdown copied!')).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = DATA.markdown || '';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Markdown copied!');
    });
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

})();
</script>
</body>
</html>
