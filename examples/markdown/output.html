<script>const DATA = {"markdown":"# The Long, Slow, Inevitable Death of the PDF\n\nThe PDF is the universal output format. Every report, every spec, every\ncontract, every menu, every receipt eventually becomes one. It is the\ntext-based equivalent of a fax: hated, ubiquitous, immortal.\n\nThis is mostly because nothing better has shown up. Word documents are\nproprietary. Markdown is too plain. HTML is too varied. So the PDF\nendures, like a cockroach with a \"Save As\" button.\n\n## Why PDFs persist\n\nThere are three real reasons:\n\n1. **Faithful rendering.** A PDF looks the same on every device, every\n   printer, every reader. This was a miracle in 1993 and is still useful.\n2. **Portability.** One file, one click, one envelope.\n3. **Print-to-screen consistency.** Even if you never print it, it\n   *implies* a page, which implies a finished thing, which implies trust.\n\nThe first two have alternatives that finally work. The third is harder\nto reason about, but it might be where the PDF actually lives.\n\n## What's broken about it\n\nA PDF is a closed format pretending to be an open one. The text inside\nis often hostile to copy-paste. Tables shatter on selection. Forms are\nhieroglyphics. Search works, but only barely. On a phone, a PDF asks\nyou to *zoom into a thing designed for paper*, which is the digital\nequivalent of being handed a folded map and a compass.\n\n> The PDF is the only format I know of that simultaneously feels like a\n> precious artifact and a hostile environment.\n\n## What might replace it\n\nThe candidates have always existed. They just haven't won.\n\n### HTML\n\nA single self-contained `.html` file can hold structure, color,\nillustrations, code, animation, search, and interactivity. It opens\nin any browser. It does not need an app. It is searchable, copyable,\nmobile-responsive when written correctly, and it is the format that\nagents already produce for the web.\n\nThe downside has always been that authoring was hard. That is what\njust changed.\n\n### Markdown\n\nLighter than HTML, with the same portability. But markdown has no\nvisual identity. A 100-page PDF and a 100-page markdown file feel\nnothing alike. Markdown is a working draft; PDF is a finished thing.\nThis is sociology more than technology.\n\n### Notion / Slabs / Walling / Capacities\n\nBeautiful, but locked. You don't have the file. You have a link, and\nthe link only works while you're paying.\n\n## So what changes now\n\nThe shape of the answer is: **make HTML feel finished**. Authoring used\nto be the bottleneck — a designer to lay out the typography, an engineer\nto wire the interactions. Both of those are now things an agent can do\nin a single prompt.\n\nA PDF says \"this document is final.\" An HTML file produced by an agent\nthat read your specs, your data, your repo, your meeting notes, *and\nturned them into a single file with search, navigation, dark mode and\nmobile responsiveness* says \"this document is alive.\"\n\nThat second one is more useful.\n\n---\n\n## Footnotes\n\n- The single-self-contained-file thing matters. Multi-file SPAs are\n  not portable; you can't email them.\n- Search inside the HTML file is non-negotiable. The number of times\n  per week I `Cmd-F` inside a long document is the reason any reading\n  experience without it feels broken.\n- Mobile responsive is non-negotiable. People will read what you sent\n  on a phone, in a hurry, between meetings. If they can't, they don't.\n\nThe PDF is going to outlive every single one of us. But it shouldn't\nhave to.\n","headings":[{"level":1,"text":"The Long, Slow, Inevitable Death of the PDF"},{"level":2,"text":"Why PDFs persist"},{"level":2,"text":"What's broken about it"},{"level":2,"text":"What might replace it"},{"level":3,"text":"HTML"},{"level":3,"text":"Markdown"},{"level":3,"text":"Notion / Slabs / Walling / Capacities"},{"level":2,"text":"So what changes now"},{"level":2,"text":"Footnotes"}],"sourceFile":"input.md","sizeBytes":3429,"wordCount":581,"lineCount":90,"headingCount":9};</script>
<script>
(function() {
  // ─── Markdown Parser ───────────────────────────────────────────────────────
  function parseMarkdown(md) {
    const lines = md.split('\n');
    let html = '';
    let i = 0;
    let inUl = false, inOl = false, inBlockquote = false, inPre = false;

    function closeList() {
      if (inUl) { html += '</ul>\n'; inUl = false; }
      if (inOl) { html += '</ol>\n'; inOl = false; }
    }
    function closeBlockquote() {
      if (inBlockquote) { html += '</blockquote>\n'; inBlockquote = false; }
    }

    function inlineFormat(text) {
      // Escape HTML first
      text = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      // Code spans
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold + italic
      text = text.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
      // Bold
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      // Italic
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      text = text.replace(/_([^_]+)_/g, '<em>$1</em>');
      // Links
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      // Strikethrough
      text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');
      return text;
    }

    function makeId(text) {
      return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
    }

    while (i < lines.length) {
      const line = lines[i];

      // Fenced code block
      if (line.trim().startsWith('```')) {
        closeList(); closeBlockquote();
        const lang = line.trim().slice(3).trim();
        let code = '';
        i++;
        while (i < lines.length && !lines[i].trim().startsWith('```')) {
          code += lines[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '\n';
          i++;
        }
        html += `<pre><code${lang ? ` class="language-${lang}"` : ''}>${code.trimEnd()}</code></pre>\n`;
        i++;
        continue;
      }

      // Headings
      const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
      if (hMatch) {
        closeList(); closeBlockquote();
        const level = hMatch[1].length;
        const text = hMatch[2];
        const id = makeId(text);
        html += `<h${level} id="${id}">${inlineFormat(text)}</h${level}>\n`;
        i++; continue;
      }

      // HR
      if (/^[-*_]{3,}$/.test(line.trim())) {
        closeList(); closeBlockquote();
        html += '<hr>\n';
        i++; continue;
      }

      // Blockquote
      if (line.startsWith('> ') || line === '>') {
        closeList();
        const content = line.replace(/^>\s?/, '');
        if (!inBlockquote) { html += '<blockquote>\n'; inBlockquote = true; }
        html += `<p>${inlineFormat(content)}</p>\n`;
        i++; continue;
      } else {
        closeBlockquote();
      }

      // Unordered list
      const ulMatch = line.match(/^(\s*)[*\-+]\s+(.+)$/);
      if (ulMatch) {
        closeOl();
        if (!inUl) { html += '<ul>\n'; inUl = true; }
        html += `<li>${inlineFormat(ulMatch[2])}</li>\n`;
        i++; continue;
      }

      // Ordered list
      const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
      if (olMatch) {
        closeUl();
        if (!inOl) { html += '<ol>\n'; inOl = true; }
        html += `<li>${inlineFormat(olMatch[2])}</li>\n`;
        i++; continue;
      }

      // Empty line
      if (line.trim() === '') {
        closeList(); closeBlockquote();
        i++; continue;
      }

      // Paragraph
      closeList(); closeBlockquote();
      let para = line;
      while (i + 1 < lines.length && lines[i+1].trim() !== '' && !lines[i+1].match(/^#{1,6}\s/) && !lines[i+1].startsWith('>') && !lines[i+1].match(/^(\s*)[*\-+]\s/) && !lines[i+1].match(/^(\s*)\d+\.\s/) && !lines[i+1].trim().startsWith('```') && !/^[-*_]{3,}$/.test(lines[i+1].trim())) {
        i++;
        para += ' ' + lines[i];
      }
      html += `<p>${inlineFormat(para)}</p>\n`;
      i++;
    }
    closeList(); closeBlockquote();

    function closeUl() { if (inUl) { html += '</ul>\n'; inUl = false; } }
    function closeOl() { if (inOl) { html += '</ol>\n'; inOl = false; } }

    return html;
  }

  // ─── Render ────────────────────────────────────────────────────────────────
  const content = DATA.opening || '';
  // Use full markdown if available
  const rawMd = DATA.markdown || DATA.opening || '';

  const rendered = parseMarkdown(rawMd);
  const container = document.getElementById('renderedContent');
  container.innerHTML = rendered;

  // ─── Meta bar ─────────────────────────────────────────────────────────────
  const article = document.getElementById('articleContent');
  const metaBar = document.createElement('div');
  metaBar.className = 'meta-bar';
  const wc = DATA.wordCount ? `<span class="meta-pill">${DATA.wordCount} words</span>` : '';
  const lc = DATA.lineCount ? `<span class="meta-pill">${DATA.lineCount} lines</span>` : '';
  const hc = DATA.headingCount ? `<span class="meta-pill">${DATA.headingCount} sections</span>` : '';
  const readTime = DATA.wordCount ? `<span class="meta-pill">~${Math.ceil(DATA.wordCount/200)} min read</span>` : '';
  metaBar.innerHTML = wc + lc + hc + readTime;

  // Copy button in header
  const h1 = container.querySelector('h1');
  if (h1) {
    const headerRow = document.createElement('div');
    headerRow.className = 'article-header-row';
    h1.parentNode.insertBefore(headerRow, h1);
    headerRow.appendChild(h1);
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy text`;
    copyBtn.addEventListener('click', function() {
      const text = container.innerText || container.textContent;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy text`;
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
    headerRow.appendChild(copyBtn);
    container.insertBefore(metaBar, h1.parentNode.nextSibling || container.firstChild.nextSibling);
  }

  // ─── TOC ──────────────────────────────────────────────────────────────────
  const headings = container.querySelectorAll('h1, h2, h3, h4, h5, h6');
  const tocDesktop = document.getElementById('tocListDesktop');
  const tocMobile = document.getElementById('tocListMobile');

  headings.forEach(h => {
    if (!h.id) {
      h.id = h.textContent.toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');
    }
    const li = document.createElement('li');
    li.className = `toc-${h.tagName.toLowerCase()}`;
    const a = document.createElement('a');
    a.href = `#${h.id}`;
    a.textContent = h.textContent;
    a.dataset.target = h.id;
    li.appendChild(a);
    tocDesktop.appendChild(li.cloneNode(true));
    tocMobile.appendChild(li);
  });

  // TOC active on scroll
  const tocLinks = document.querySelectorAll('.toc-list a');
  let observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(a => a.classList.remove('active'));
        const id = entry.target.id;
        tocLinks.forEach(a => { if (a.dataset.target === id) a.classList.add('active'); });
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  headings.forEach(h => observer.observe(h));

  // Mobile TOC toggle
  document.getElementById('tocToggle').addEventListener('click', function() {
    const panel = document.getElementById('tocMobilePanel');
    const open = panel.classList.toggle('open');
    this.setAttribute('aria-expanded', open);
  });

  // Smooth scroll for TOC links
  document.querySelectorAll('.toc-list a').forEach(a => {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      const id = this.dataset.target;
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Close mobile TOC
      document.getElementById('tocMobilePanel').classList.remove('open');
    });
  });

  // ─── Search ───────────────────────────────────────────────────────────────
  const searchInput = document.getElementById('searchInput');
  const searchCount = document.getElementById('searchCount');
  const noResults = document.getElementById('noResults');
  let originalHTML = container.innerHTML;

  // Keyboard shortcut
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      searchInput.value = '';
      doSearch('');
      searchInput.blur();
    }
  });

  function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function doSearch(query) {
    // Restore original
    container.innerHTML = originalHTML;
    if (!query.trim()) {
      searchCount.textContent = '';
      noResults.style.display = 'none';
      container.style.display = '';
      return;
    }
    const re = new RegExp(escapeRe(query), 'gi');
    let count = 0;
    function walkAndHighlight(node) {
      if (node.nodeType === 3) {
        const text = node.textContent;
        if (re.test(text)) {
          re.lastIndex = 0;
          const frag = document.createDocumentFragment();
          let last = 0, m;
          re.lastIndex = 0;
          while ((m = re.exec(text)) !== null) {
            frag.appendChild(document.createTextNode(text.slice(last, m.index)));
            const mark = document.createElement('mark');
            mark.textContent = m[0];
            frag.appendChild(mark);
            last = m.index + m[0].length;
            count++;
          }
          frag.appendChild(document.createTextNode(text.slice(last)));
          node.parentNode.replaceChild(frag, node);
        }
      } else if (node.nodeType === 1 && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
        Array.from(node.childNodes).forEach(walkAndHighlight);
      }
    }
    walkAndHighlight(container);
    if (count === 0) {
      noResults.style.display = 'block';
      container.style.display = 'none';
      searchCount.textContent = '0 found';
    } else {
      noResults.style.display = 'none';
      container.style.display = '';
      searchCount.textContent = `${count} match${count !== 1 ? 'es' : ''}`;
      // Scroll to first match
      const first = container.querySelector('mark');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  let searchTimer;
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(this.value), 120);
  });

  // ─── Read Progress ─────────────────────────────────────────────────────────
  const progressBar = document.getElementById('readProgress');
  const scrollTopBtn = document.getElementById('scrollTop');

  window.addEventListener('scroll', function() {
    const docH = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
    progressBar.style.width = pct + '%';
    scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });

  scrollTopBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ─── Footer ───────────────────────────────────────────────────────────────
  const footer = document.getElementById('siteFooter');
  footer.textContent = DATA.sourceFile ? `Source: ${DATA.sourceFile}` : '';

})();
</script>
</body>
