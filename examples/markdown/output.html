<script>const DATA = {"markdown":"# The Long, Slow, Inevitable Death of the PDF\n\nThe PDF is the universal output format. Every report, every spec, every\ncontract, every menu, every receipt eventually becomes one. It is the\ntext-based equivalent of a fax: hated, ubiquitous, immortal.\n\nThis is mostly because nothing better has shown up. Word documents are\nproprietary. Markdown is too plain. HTML is too varied. So the PDF\nendures, like a cockroach with a \"Save As\" button.\n\n## Why PDFs persist\n\nThere are three real reasons:\n\n1. **Faithful rendering.** A PDF looks the same on every device, every\n   printer, every reader. This was a miracle in 1993 and is still useful.\n2. **Portability.** One file, one click, one envelope.\n3. **Print-to-screen consistency.** Even if you never print it, it\n   *implies* a page, which implies a finished thing, which implies trust.\n\nThe first two have alternatives that finally work. The third is harder\nto reason about, but it might be where the PDF actually lives.\n\n## What's broken about it\n\nA PDF is a closed format pretending to be an open one. The text inside\nis often hostile to copy-paste. Tables shatter on selection. Forms are\nhieroglyphics. Search works, but only barely. On a phone, a PDF asks\nyou to *zoom into a thing designed for paper*, which is the digital\nequivalent of being handed a folded map and a compass.\n\n> The PDF is the only format I know of that simultaneously feels like a\n> precious artifact and a hostile environment.\n\n## What might replace it\n\nThe candidates have always existed. They just haven't won.\n\n### HTML\n\nA single self-contained `.html` file can hold structure, color,\nillustrations, code, animation, search, and interactivity. It opens\nin any browser. It does not need an app. It is searchable, copyable,\nmobile-responsive when written correctly, and it is the format that\nagents already produce for the web.\n\nThe downside has always been that authoring was hard. That is what\njust changed.\n\n### Markdown\n\nLighter than HTML, with the same portability. But markdown has no\nvisual identity. A 100-page PDF and a 100-page markdown file feel\nnothing alike. Markdown is a working draft; PDF is a finished thing.\nThis is sociology more than technology.\n\n### Notion / Slabs / Walling / Capacities\n\nBeautiful, but locked. You don't have the file. You have a link, and\nthe link only works while you're paying.\n\n## So what changes now\n\nThe shape of the answer is: **make HTML feel finished**. Authoring used\nto be the bottleneck — a designer to lay out the typography, an engineer\nto wire the interactions. Both of those are now things an agent can do\nin a single prompt.\n\nA PDF says \"this document is final.\" An HTML file produced by an agent\nthat read your specs, your data, your repo, your meeting notes, *and\nturned them into a single file with search, navigation, dark mode and\nmobile responsiveness* says \"this document is alive.\"\n\nThat second one is more useful.\n\n---\n\n## Footnotes\n\n- The single-self-contained-file thing matters. Multi-file SPAs are\n  not portable; you can't email them.\n- Search inside the HTML file is non-negotiable. The number of times\n  per week I `Cmd-F` inside a long document is the reason any reading\n  experience without it feels broken.\n- Mobile responsive is non-negotiable. People will read what you sent\n  on a phone, in a hurry, between meetings. If they can't, they don't.\n\nThe PDF is going to outlive every single one of us. But it shouldn't\nhave to.\n","headings":[{"level":1,"text":"The Long, Slow, Inevitable Death of the PDF"},{"level":2,"text":"Why PDFs persist"},{"level":2,"text":"What's broken about it"},{"level":2,"text":"What might replace it"},{"level":3,"text":"HTML"},{"level":3,"text":"Markdown"},{"level":3,"text":"Notion / Slabs / Walling / Capacities"},{"level":2,"text":"So what changes now"},{"level":2,"text":"Footnotes"}],"sourceFile":"input.md","sizeBytes":3429,"wordCount":581,"lineCount":90,"headingCount":9};</script>

.anchor-link {
  display: inline-flex;
  opacity: 0;
  color: var(--fg-muted);
  text-decoration: none;
  transition: opacity 140ms;
}

.markdown-body h3:hover .anchor-link { opacity: 1; }

/* ── FOOTER ── */
.doc-footer {
  border-top: 1px solid var(--border);
  padding: var(--space-2xl) var(--space-lg);
  margin-top: var(--space-5xl);
  text-align: center;
}

  font-size: 12px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  line-height: 1.6;
}

/* ── SCROLL INDICATOR ── */
.reading-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 2px;
  background: var(--gradient-primary);
  z-index: 200;
  transition: width 100ms linear;
}

/* ── ANIMATIONS ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-entry {
  opacity: 0;
  animation: fadeSlideUp 320ms ease forwards;
}
.anim-entry:nth-child(1) { animation-delay: 60ms; }
.anim-entry:nth-child(2) { animation-delay: 120ms; }
.anim-entry:nth-child(3) { animation-delay: 180ms; }
.anim-entry:nth-child(4) { animation-delay: 240ms; }
.anim-entry:nth-child(5) { animation-delay: 300ms; }

@media (prefers-reduced-motion: reduce) {
  .anim-entry { animation: none; opacity: 1; }
  .reading-progress { transition: none; }
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .reader-rail { display: none; }
  .jump-dropdown-wrap { display: block; }
  .layout { padding: var(--space-xl) var(--space-lg); gap: 0; }

}

@media (max-width: 500px) {

  .topbar { padding: var(--space-sm) var(--space-md); }
  .tldr { padding: var(--space-lg); }
  .cover-title { font-size: 24px; }
}

/* ── PRINT ── */
@media print {
  .topbar, .reader-rail, .jump-dropdown-wrap, .reading-progress, .topbar-actions { display: none !important; }
  .layout { padding: 0; }
  .body-sheet { max-width: 100%; }
  body { color: #000; background: #fff; }
  .markdown-body h2, .markdown-body h3 { page-break-after: avoid; }

}

<div class="document-shell">
  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-brand">html-anything</span>
    <div class="topbar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search document…" autocomplete="off" spellcheck="false">
      <span class="search-status" id="searchStatus"></span>
    </div>
    <div class="topbar-actions">
      <div class="mode-toggle">
        <button class="mode-btn active" id="btnFiveMin" onclick="setMode('five')">5-min</button>
        <button class="mode-btn" id="btnFull" onclick="setMode('full')">Full</button>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyMarkdown()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>Copy MD</span>
      </button>
    </div>
  </header>

  <!-- JUMP DROPDOWN (mobile) -->
  <div class="jump-dropdown-wrap">
    <select id="jumpSelect" onchange="jumpToSection(this.value)">
      <option value="">Jump to section…</option>
    </select>
  </div>

  <!-- LAYOUT -->
  <div class="layout">
    <!-- READER RAIL -->
    <nav class="reader-rail" id="readerRail">
      <div>
        <div class="rail-label">Contents</div>
        <ul class="toc-list" id="tocList"></ul>
      </div>
      <div class="rail-meta" id="railMeta">
        <div class="rail-label" style="margin-bottom:var(--space-xs)">Document</div>
        <div class="rail-meta-row"><span class="rail-meta-label">Words</span><span class="rail-meta-val" id="metaWords">—</span></div>
        <div class="rail-meta-row"><span class="rail-meta-label">Read time</span><span class="rail-meta-val" id="metaTime">—</span></div>
        <div class="rail-meta-row"><span class="rail-meta-label">Sections</span><span class="rail-meta-val" id="metaHeadings">—</span></div>
        <div class="rail-meta-row"><span class="rail-meta-label">Lines</span><span class="rail-meta-val" id="metaLines">—</span></div>
      </div>
    </nav>

    <!-- BODY SHEET -->
    <main class="body-sheet">
      <!-- COVER -->
      <div class="cover anim-entry">
        <div class="cover-eyebrow">
          <span class="cover-tag">Essay</span>
          <div class="cover-meta-chips">
            <span class="cover-meta-chip" id="chipWords"></span>
            <span class="cover-meta-chip" id="chipTime"></span>
            <span class="cover-meta-chip" id="chipSections"></span>
          </div>
        </div>
        <h1 class="cover-title" id="coverTitle">Loading…</h1>

        <!-- TL;DR -->
        <div class="tldr anim-entry">
          <div class="tldr-label">TL;DR — three key observations</div>
          <ul class="tldr-list" id="tldrList"></ul>
        </div>

        <!-- PULL QUOTES -->
        <div class="pull-quotes anim-entry" id="pullQuotes"></div>

      <div class="five-min-view" id="fiveMinView">

<script>
// ── DATA EXTRACTION ──
const md = DATA.markdown || '';
const headings = DATA.headings || [];
const wordCount = DATA.wordCount || 0;
const lineCount = DATA.lineCount || 0;
const headingCount = DATA.headingCount || headings.length;
const readingMinutes = Math.max(1, Math.round(wordCount / 200));

// ── CURATED CONTENT (from document analysis) ──
const TLDR = [
  "PDFs persist not because they're good, but because no single alternative has successfully combined faithful rendering, portability, and the psychological weight of a \"finished\" document.",
  "The format's core failures — hostile copy-paste, table fragmentation, phone-unfriendly layout — are structural, not accidental, making them impossible to patch without abandoning the format itself.",
  "The real successor isn't HTML, Markdown, or any single tool: it's the collapse of the document concept entirely, as AI makes search and synthesis more useful than structured pages."
];

const PULL_QUOTES = [
  "The PDF is the only format I know of that simultaneously feels like a precious artifact and a hostile environment.",
  "On a phone, a PDF asks you to zoom into a thing designed for paper, which is the digital equivalent of being handed a folded map and a compass.",
  "A PDF is a closed format pretending to be an open one."
];

const SECTION_SUMMARIES = {
  "Why PDFs persist": "Three durable reasons: pixel-perfect rendering across every device, single-file portability, and the implicit trust signal of something that looks printed and finished.",
  "What's broken about it": "Hostile to copy-paste, tables shatter on selection, forms are opaque, and on mobile the format asks users to zoom into something designed for A4 paper.",
  "What might replace it": "Three candidates emerge — HTML, Markdown, and collaborative cloud tools — each capturing part of what PDF does but none yet owning the whole job.",
  "HTML": "The most capable replacement technically, but too fragmented in practice: no canonical viewer, no consistent offline story, and infinite visual variance undermine trust.",
  "Markdown": "The format of choice for developers and writers who accept plainness, but its lack of layout control and image handling keeps it niche outside technical audiences.",
  "Notion / Slabs / Walling / Capacities": "Cloud-native knowledge tools that solve collaboration and search but trade the PDF's durability for platform dependence — you can't email a Notion page.",
  "So what changes now": "AI makes the document as a delivery mechanism less necessary — if a model can synthesise any source on demand, the need to ship a fixed file begins to dissolve.",
  "Footnotes": "Source references and supplementary notes grounding the claims made throughout the essay."
};

// ── INIT ──
function init() {
  // Meta chips
  const title = headings.find(h => h.level === 1)?.text || 'Document';
  document.getElementById('coverTitle').innerHTML = `<span>${escapeHtml(title)}</span>`;
  document.title = title;

  document.getElementById('chipWords').textContent = `${wordCount.toLocaleString()} words`;
  document.getElementById('chipTime').textContent = `~${readingMinutes} min read`;
  document.getElementById('chipSections').textContent = `${headingCount} sections`;

  // Rail meta
  document.getElementById('metaWords').textContent = wordCount.toLocaleString();
  document.getElementById('metaTime').textContent = `${readingMinutes} min`;
  document.getElementById('metaHeadings').textContent = headingCount;
  document.getElementById('metaLines').textContent = lineCount;

  // TL;DR
  const tldrList = document.getElementById('tldrList');
  TLDR.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = 'tldr-item';
    li.innerHTML = `<span class="tldr-num">${i+1}</span><span>${escapeHtml(item)}</span>`;
    tldrList.appendChild(li);
  });

  // Pull quotes
  const pqContainer = document.getElementById('pullQuotes');
  PULL_QUOTES.forEach(q => {
    const div = document.createElement('div');
    div.className = 'pull-quote';
    div.textContent = q;
    pqContainer.appendChild(div);
  });

  // Build TOC
  buildTOC();

  // Build section cards (5-min)
  buildSectionCards();

  // Render full markdown
  renderMarkdown();

  // Default mode
  const defaultMode = wordCount > 1500 ? 'five' : 'full';
  setMode(defaultMode, true);

  // Reading progress
  window.addEventListener('scroll', updateProgress, { passive: true });

  // TOC active tracking
  setupTOCObserver();
}

function buildTOC() {
  const tocList = document.getElementById('tocList');
  const jumpSelect = document.getElementById('jumpSelect');
  const h2h3 = headings.filter(h => h.level === 2 || h.level === 3);

  h2h3.forEach((h, i) => {
    const id = slugify(h.text);
    const li = document.createElement('li');
    li.className = `toc-item level-${h.level}`;
    li.dataset.id = id;
    const a = document.createElement('a');
    a.href = `#${id}`;
    a.textContent = h.text;
    li.appendChild(a);
    tocList.appendChild(li);

    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = (h.level === 3 ? '  ↳ ' : '') + h.text;
    jumpSelect.appendChild(opt);
  });
}

function buildSectionCards() {
  const container = document.getElementById('sectionCards');
  const h2s = headings.filter(h => h.level === 2 || h.level === 3);

  h2s.forEach(h => {
    const id = slugify(h.text);
    const summary = SECTION_SUMMARIES[h.text] || '';
    const a = document.createElement('a');
    a.className = 'section-card';
    a.href = `#${id}`;
    a.onclick = (e) => { e.preventDefault(); setMode('full'); setTimeout(() => scrollToId(id), 60); };
    a.innerHTML = `
      <div class="section-card-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
      </div>
      <div class="section-card-body">
        <div class="section-card-title">${escapeHtml(h.text)}</div>
        ${summary ? `<div class="section-card-summary">${escapeHtml(summary)}</div>` : ''}
      </div>
    `;
    container.appendChild(a);
  });
}

function renderMarkdown() {
  const body = document.getElementById('markdownBody');
  body.innerHTML = parseMarkdown(md);
}

// ── TINY MARKDOWN PARSER ──
function parseMarkdown(text) {
  const lines = text.split('\n');
  let html = '';
  let inCode = false;
  let codeLang = '';
  let codeLines = [];
  let inList = null; // 'ul' or 'ol'
  let listItems = [];

  function flushList() {
    if (!inList) return;
    const tag = inList;
    html += `<${tag}>${listItems.join('')}</${tag}>\n`;
    inList = null;
    listItems = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Code fence
    if (line.startsWith('```')) {
      if (!inCode) {
        flushList();
        inCode = true;
        codeLang = line.slice(3).trim();
        codeLines = [];
      } else {
        inCode = false;
        const escaped = escapeHtml(codeLines.join('\n'));
        html += `<pre><code class="lang-${escapeHtml(codeLang)}">${escaped}</code></pre>\n`;
        codeLines = [];
        codeLang = '';
      }
      continue;
    }

    if (inCode) {
      codeLines.push(line);
      continue;
    }

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) {
      flushList();
      const level = hMatch[1].length;
      const txt = hMatch[2];
      const id = slugify(txt);
      const inner = inlineMarkdown(txt);
      if (level === 1) {
        html += `<h1 id="${id}">${inner}</h1>\n`;
      } else if (level === 2) {
        html += `<h2 id="${id}"><span class="section-heading-anchor">${inner}<a class="anchor-link" href="#${id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></a></span></h2>\n`;
      } else if (level === 3) {
        html += `<h3 id="${id}"><span class="section-heading-anchor">${inner}<a class="anchor-link" href="#${id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></a></span></h3>\n`;
      } else {
        html += `<h${level} id="${id}">${inner}</h${level}>\n`;
      }
      continue;
    }

    // HR
    if (/^---+$/.test(line.trim()) || /^\*\*\*+$/.test(line.trim())) {
      flushList();
      html += `<hr>\n`;
      continue;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      flushList();
      const qText = line.slice(2);
      html += `<blockquote><p>${inlineMarkdown(qText)}</p></blockquote>\n`;
      continue;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)[-*+]\s+(.+)$/);
    if (ulMatch) {
      if (inList !== 'ul') { flushList(); inList = 'ul'; }
      listItems.push(`<li>${inlineMarkdown(ulMatch[2])}</li>`);
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
    if (olMatch) {
      if (inList !== 'ol') { flushList(); inList = 'ol'; }
      listItems.push(`<li>${inlineMarkdown(olMatch[2])}</li>`);
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      flushList();
      continue;
    }

    // Paragraph
    flushList();
    html += `<p>${inlineMarkdown(line)}</p>\n`;
  }

  flushList();
  if (inCode && codeLines.length) {
    html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>\n`;
  }

  return html;
}

function inlineMarkdown(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" rel="noopener">$1</a>');
  return text;
}

// ── MODE TOGGLE ──
let currentMode = 'five';

function setMode(mode, silent) {
  currentMode = mode;
  const fiveView = document.getElementById('fiveMinView');
  const fullView = document.getElementById('fullView');
  const btnFive = document.getElementById('btnFiveMin');
  const btnFull = document.getElementById('btnFull');

  if (mode === 'five') {
    fiveView.classList.remove('hidden');
    fullView.classList.remove('active');
    btnFive.classList.add('active');
    btnFull.classList.remove('active');
  } else {
    fiveView.classList.add('hidden');
    fullView.classList.add('active');
    btnFull.classList.add('active');
    btnFive.classList.remove('active');
  }
}

// ── TOC OBSERVER ──
function setupTOCObserver() {
  if (!window.IntersectionObserver) return;
  const tocItems = document.querySelectorAll('.toc-item');
  const ids = Array.from(tocItems).map(el => el.dataset.id).filter(Boolean);
  const targets = ids.map(id => document.getElementById(id)).filter(Boolean);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        tocItems.forEach(item => {
          item.classList.toggle('active', item.dataset.id === id);
        });
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });

  targets.forEach(t => observer.observe(t));
}

// ── SEARCH ──
let searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => doSearch(this.value.trim()), 120);
});

function doSearch(query) {
  const status = document.getElementById('searchStatus');
  // Clear old highlights
  const markdownBody = document.getElementById('markdownBody');
  clearHighlights(markdownBody);

  if (!query) {
    status.textContent = '';
    status.classList.remove('visible');
    return;
  }

  const count = highlightIn(markdownBody, query);
  status.textContent = count > 0 ? `${count} hit${count !== 1 ? 's' : ''}` : 'no match';
  status.classList.add('visible');

  if (count > 0) {
    // Switch to full mode and scroll to first hit
    setMode('full');
    setTimeout(() => {
      const first = markdownBody.querySelector('mark.search-hit');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 60);
  }
}

function clearHighlights(container) {
  container.querySelectorAll('mark.search-hit').forEach(mark => {
    const parent = mark.parentNode;
    parent.replaceChild(document.createTextNode(mark.textContent), mark);
    parent.normalize();
  });
}

function highlightIn(container, query) {
  let count = 0;
  const regex = new RegExp(escapeRegex(query), 'gi');
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const nodesToProcess = [];
  let node;
  while ((node = walker.nextNode())) {
    if (node.nodeValue.trim() && regex.test(node.nodeValue)) {
      nodesToProcess.push(node);
    }
    regex.lastIndex = 0;
  }
  nodesToProcess.forEach(textNode => {
    const frag = document.createDocumentFragment();
    const parts = textNode.nodeValue.split(regex);
    const matches = textNode.nodeValue.match(regex) || [];
    parts.forEach((part, i) => {
      frag.appendChild(document.createTextNode(part));
      if (i < matches.length) {
        const mark = document.createElement('mark');
        mark.className = 'search-hit';
        mark.textContent = matches[i];
        frag.appendChild(mark);
        count++;
      }
    });
    textNode.parentNode.replaceChild(frag, textNode);
  });
  return count;
}

// ── COPY MARKDOWN ──
function copyMarkdown() {
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(md).then(() => {
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = 'Copy MD';
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = md;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.classList.add('copied');
    btn.querySelector('span').textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.querySelector('span').textContent = 'Copy MD';
    }, 2000);
  });
}

// ── JUMP NAV ──
function jumpToSection(id) {
  if (!id) return;
  document.getElementById('jumpSelect').value = '';
  setMode('full');
  setTimeout(() => scrollToId(id), 60);
}

function scrollToId(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── READING PROGRESS ──
function updateProgress() {
  const bar = document.getElementById('readingProgress');
  const doc = document.documentElement;
  const scrollTop = doc.scrollTop || document.body.scrollTop;
  const scrollHeight = doc.scrollHeight - doc.clientHeight;
  const pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
  bar.style.width = pct.toFixed(1) + '%';
}

// ── UTILS ──
function slugify(text) {
  return text.toLowerCase()
    .replace(/[^\w\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

document.addEventListener('DOMContentLoaded', init);
