<html lang="en">
<head>

<title>Coffee Equipment Sales — January 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --primary: #a03b00;
  --primary-container: #c94c00;
  --primary-fixed: #ffdbcd;
  --primary-fixed-dim: #ffb597;
  --on-primary: #ffffff;
  --accent-glow: #E8400D;
  --secondary: #d5baff;
  --secondary-container: #7b40e0;
  --tertiary: #4d44e3;
  --accent-cyan: #00D4FF;
  --bg: #fff8f6;
  --surface: #fff8f6;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fbf2ef;
  --surface-container: #f5ece9;
  --surface-container-high: #efe6e3;
  --fg-1: #1e1b19;
  --fg-2: #594138;
  --fg-muted: #8d7166;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.12);
  --outline-variant: #e1bfb2;
  --green: #10b981;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --font-headline: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 20px; --space-2xl: 24px;
  --space-3xl: 32px; --space-4xl: 48px; --space-5xl: 64px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --shadow-sm: 0 1px 2px rgba(30,27,25,0.04);
  --shadow-md: 0 4px 12px rgba(30,27,25,0.08);
  --shadow-lg: 0 8px 24px rgba(30,27,25,0.12);
  --shadow-accent: 0 8px 24px rgba(160,59,0,0.15);
  --gradient-primary: linear-gradient(135deg,#a03b00 0%,#c94c00 100%);
  --gradient-hero: linear-gradient(135deg,#a03b00 0%,#7b40e0 100%);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060B18;
    --surface: #0B1426;
    --surface-container-lowest: #101D35;
    --surface-container-low: #101D35;
    --surface-container: #162544;
    --surface-container-high: #1c2d52;
    --fg-1: #F8FAFC;
    --fg-2: #CBD5E1;
    --fg-muted: #64748B;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --primary: #FF6B35;
    --accent-glow: #00D4FF;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    --outline-variant: #1c2d52;
    --primary-fixed: rgba(255,107,53,0.15);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.6;
  background:var(--bg);
  color:var(--fg-1);
  min-height:100vh;
}
h1,h2,h3,h4{
  font-family:var(--font-headline);
  letter-spacing:-0.01em;
  line-height:1.2;
}
.container{max-width:1100px;margin:0 auto;padding:0 var(--space-lg);}
/* HEADER */
.page-header{
  background:var(--gradient-hero);
  padding:var(--space-4xl) var(--space-lg) var(--space-3xl);
  position:relative;
  overflow:hidden;
}
.page-header::before{
  content:'';
  position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.page-header .inner{position:relative;z-index:1;max-width:1100px;margin:0 auto;}
.page-header .eyebrow{
  font-family:var(--font-body);
  font-size:12px;
  font-weight:600;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.65);
  margin-bottom:var(--space-sm);
}
.page-header h1{
  font-size:clamp(24px,5vw,42px);
  font-weight:700;
  color:#fff;
  margin-bottom:var(--space-md);
}
.page-header .subtitle{
  font-size:15px;
  color:rgba(255,255,255,0.8);
  max-width:600px;
  line-height:1.5;
}
/* KPI CARDS */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:var(--space-lg);
  margin:var(--space-3xl) 0;
}
.kpi-card{
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-lg);
  padding:var(--space-xl) var(--space-2xl);
  box-shadow:var(--shadow-md);
  transition:box-shadow 0.2s,transform 0.2s;
}
.kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.kpi-card .label{
  font-size:12px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--fg-muted);
  margin-bottom:var(--space-sm);
}
.kpi-card .value{
  font-family:var(--font-headline);
  font-size:clamp(22px,4vw,32px);
  font-weight:700;
  color:var(--primary);
  letter-spacing:-0.02em;
  line-height:1;
}
.kpi-card .sub{
  font-size:12px;
  color:var(--fg-muted);
  margin-top:var(--space-xs);
}
/* OUTLIER CALLOUTS */
.callouts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:var(--space-md);
  margin-bottom:var(--space-3xl);
}
.callout{
  background:var(--primary-fixed);
  border-left:3px solid var(--primary);
  border-radius:var(--radius-md);
  padding:var(--space-lg);
  font-size:13.5px;
  color:var(--fg-2);
  line-height:1.5;
}
@media (prefers-color-scheme: dark){
  .callout{background:var(--surface-container);color:var(--fg-2);}
}
.callout strong{color:var(--primary);font-weight:600;}
.callout .tag{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.07em;
  text-transform:uppercase;
  color:var(--primary);
  margin-bottom:var(--space-xs);
}
/* SECTION HEADERS */
.section-title{
  font-family:var(--font-headline);
  font-size:20px;
  font-weight:700;
  color:var(--fg-1);
  margin-bottom:var(--space-xl);
  display:flex;
  align-items:center;
  gap:var(--space-sm);
}
.section-title::after{
  content:'';flex:1;
  height:1px;
  background:var(--border-strong);
}
/* CHARTS SECTION */
.charts-section{margin-bottom:var(--space-4xl);}
.charts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:var(--space-xl);
  margin-bottom:var(--space-xl);
}
.chart-card{
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-lg);
  padding:var(--space-xl);
  box-shadow:var(--shadow-md);
}
.chart-card h3{
  font-size:14px;
  font-weight:600;
  color:var(--fg-2);
  margin-bottom:var(--space-xl);
  letter-spacing:-0.005em;
}
.chart-card.wide{
  grid-column:1/-1;
}
/* BAR CHART */
.bar-chart{width:100%;overflow:hidden;}
.bar-row{
  display:flex;
  align-items:center;
  gap:var(--space-md);
  margin-bottom:var(--space-md);
}
.bar-row:last-child{margin-bottom:0;}
.bar-label{
  font-size:12.5px;
  font-weight:500;
  color:var(--fg-2);
  width:130px;
  flex-shrink:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.bar-track{
  flex:1;
  background:var(--surface-container);
  border-radius:var(--radius-pill);
  height:10px;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  border-radius:var(--radius-pill);
  transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-val{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--fg-muted);
  width:70px;
  text-align:right;
  flex-shrink:0;
}
/* DONUT */
.donut-wrap{
  display:flex;
  align-items:center;
  gap:var(--space-2xl);
  flex-wrap:wrap;
}
.donut-wrap svg{flex-shrink:0;}
.donut-legend{flex:1;min-width:140px;}
.legend-item{
  display:flex;
  align-items:center;
  gap:var(--space-sm);
  margin-bottom:var(--space-sm);
  font-size:12.5px;
  color:var(--fg-2);
}
.legend-dot{
  width:10px;height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.legend-val{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--fg-muted);
  margin-left:auto;
}
/* TOP N */
.top-list{list-style:none;}
.top-list li{
  display:flex;
  align-items:center;
  gap:var(--space-md);
  padding:var(--space-md) 0;
  border-bottom:1px solid var(--border);
}
.top-list li:last-child{border-bottom:none;}
.rank{
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:700;
  color:var(--fg-muted);
  width:20px;
  flex-shrink:0;
  text-align:center;
}
.rank-1{color:var(--yellow);}
.rank-2{color:var(--fg-muted);}
.rank-3{color:var(--yellow);opacity:0.7;}
.top-info{flex:1;min-width:0;}
.top-name{font-size:13.5px;font-weight:600;color:var(--fg-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-sub{font-size:11.5px;color:var(--fg-muted);}
.top-rev{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--primary);flex-shrink:0;}
/* TIME SERIES SVG */
.time-chart{width:100%;overflow:hidden;}
/* SEARCH */
.search-bar{
  display:flex;
  gap:var(--space-sm);
  align-items:center;
  margin-bottom:var(--space-lg);
  flex-wrap:wrap;
}
.search-input{
  flex:1;
  min-width:200px;
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-pill);
  padding:var(--space-sm) var(--space-lg);
  font-family:var(--font-body);
  font-size:14px;
  color:var(--fg-1);
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-input::placeholder{color:var(--fg-muted);}
.search-input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(160,59,0,0.12);
}
.sort-select{
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-pill);
  padding:var(--space-sm) var(--space-lg);
  font-family:var(--font-body);
  font-size:13px;
  color:var(--fg-1);
  outline:none;
  cursor:pointer;
}
.filter-chips{
  display:flex;
  gap:var(--space-xs);
  flex-wrap:wrap;
  margin-bottom:var(--space-md);
}
.chip{
  padding:var(--space-xs) var(--space-md);
  border-radius:var(--radius-pill);
  font-size:12px;
  font-weight:600;
  border:1px solid var(--border-strong);
  background:var(--surface-container);
  color:var(--fg-muted);
  cursor:pointer;
  transition:all 0.15s;
}
.chip.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
/* TABLE */
.table-section{margin-bottom:var(--space-5xl);}
.table-toggle{
  display:flex;
  align-items:center;
  gap:var(--space-md);
  cursor:pointer;
  user-select:none;
  margin-bottom:var(--space-xl);
  font-family:var(--font-headline);
  font-size:20px;
  font-weight:700;
  color:var(--fg-1);
}
.table-toggle::after{content:'';flex:1;height:1px;background:var(--border-strong);}
.toggle-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;height:24px;
  border-radius:50%;
  background:var(--surface-container);
  border:1px solid var(--border-strong);
  font-size:13px;
  transition:transform 0.3s;
  flex-shrink:0;
}
.toggle-icon.open{transform:rotate(180deg);}
.table-wrap{
  overflow-x:auto;
  border-radius:var(--radius-lg);
  border:1px solid var(--border-strong);
  box-shadow:var(--shadow-md);
}
.data-table{
  width:100%;
  border-collapse:collapse;
  font-size:13.5px;
}
.data-table thead{
  position:sticky;top:0;z-index:2;
  background:var(--surface-container-high);
}
.data-table th{
  font-family:var(--font-headline);
  font-size:11.5px;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--fg-muted);
  padding:var(--space-md) var(--space-lg);
  text-align:left;
  white-space:nowrap;
  cursor:pointer;
  border-bottom:1px solid var(--border-strong);
  transition:background 0.15s;
  user-select:none;
}
.data-table th:hover{background:var(--surface-container);}
.data-table th.numeric{text-align:right;}
.data-table th .sort-arrow{margin-left:4px;opacity:0.4;font-size:10px;}
.data-table th.sorted .sort-arrow{opacity:1;color:var(--primary);}
.data-table tbody tr{
  border-bottom:1px solid var(--border);
  transition:background 0.12s;
}
.data-table tbody tr:last-child{border-bottom:none;}
.data-table tbody tr:hover{background:var(--surface-container-low);}
.data-table tbody tr.highlighted{background:rgba(160,59,0,0.07);}
.data-table td{
  padding:var(--space-md) var(--space-lg);
  color:var(--fg-2);
  vertical-align:middle;
}
.data-table td.numeric{
  text-align:right;
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--fg-1);
}
.data-table td.revenue{color:var(--primary);font-weight:600;}
.data-table td .order-id{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--fg-muted);
}
.region-badge{
  display:inline-block;
  padding:2px var(--space-sm);
  border-radius:var(--radius-pill);
  font-size:11px;
  font-weight:700;
  letter-spacing:0.04em;
}
.no-rows{
  padding:var(--space-4xl);
  text-align:center;
  color:var(--fg-muted);
  font-size:14px;
}
.row-count-badge{
  display:inline-flex;
  align-items:center;
  padding:2px var(--space-sm);
  border-radius:var(--radius-pill);
  background:var(--surface-container);
  font-size:12px;
  font-weight:600;
  color:var(--fg-muted);
  margin-left:var(--space-sm);
}
/* copy btn */
.copy-btn{
  background:none;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:var(--space-xs) var(--space-sm);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  color:var(--fg-muted);
  transition:all 0.15s;
  letter-spacing:0.04em;
}
.copy-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.copy-btn.copied{background:var(--green);color:#fff;border-color:var(--green);}
/* footer */
.page-footer{
  border-top:1px solid var(--border-strong);
  padding:var(--space-3xl) var(--space-lg);
  text-align:center;
  font-size:12px;
  color:var(--fg-muted);
}
mark{
  background:rgba(160,59,0,0.18);
  color:inherit;
  border-radius:2px;
  padding:0 1px;
}
@media (prefers-color-scheme:dark){
  mark{background:rgba(255,107,53,0.25);}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .charts-grid{grid-template-columns:1fr;}
  .chart-card.wide{grid-column:1;}
  .bar-label{width:90px;font-size:11px;}
  .bar-val{width:55px;font-size:11px;}
}

<script>
(function(){
  // ─── helpers ───────────────────────────────────────────────────────────────

  const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
  const fmtUSD2 = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
  const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const sum = arr => arr.reduce((a,b)=>a+b,0);
  const max = arr => Math.max(...arr);
  const min = arr => Math.min(...arr);

  // ─── parse data ────────────────────────────────────────────────────────────
  const headers = DATA.headers;
  const rows = DATA.rows;

  const COL = {};
  headers.forEach((h,i)=>COL[h]=i);

  const parsed = rows.map(r=>({
    order_id: r[COL.order_id],
    date: r[COL.date],
    region: r[COL.region],
    product: r[COL.product],
    units: parseFloat(r[COL.units])||0,
    unit_price: parseFloat(r[COL.unit_price])||0,
    revenue: parseFloat(r[COL.revenue])||0,
    sales_rep: r[COL.sales_rep],
    raw: r
  }));

  // ─── aggregations ──────────────────────────────────────────────────────────
  const totalRevenue = sum(parsed.map(r=>r.revenue));
  const totalUnits = sum(parsed.map(r=>r.units));
  const avgOrderRevenue = totalRevenue/parsed.length;
  const maxRev = parsed.reduce((a,b)=>a.revenue>b.revenue?a:b);
  const minRev = parsed.reduce((a,b)=>a.revenue<b.revenue?a:b);

  // by region
  const byRegion = {};
  parsed.forEach(r=>{
    if(!byRegion[r.region])byRegion[r.region]={revenue:0,units:0,orders:0};
    byRegion[r.region].revenue+=r.revenue;
    byRegion[r.region].units+=r.units;
    byRegion[r.region].orders++;
  });
  const regionsSorted = Object.entries(byRegion).sort((a,b)=>b[1].revenue-a[1].revenue);
  const topRegion = regionsSorted[0];

  // by product
  const byProduct = {};
  parsed.forEach(r=>{
    if(!byProduct[r.product])byProduct[r.product]={revenue:0,units:0,orders:0};
    byProduct[r.product].revenue+=r.revenue;
    byProduct[r.product].units+=r.units;
    byProduct[r.product].orders++;

  const productsSorted = Object.entries(byProduct).sort((a,b)=>b[1].revenue-a[1].revenue);

  const byRep = {};

    if(!byRep[r.sales_rep])byRep[r.sales_rep]={revenue:0,orders:0};

    byRep[r.sales_rep].orders++;

    if(!byDate[r.date])byDate[r.date]=0;
    byDate[r.date]+=r.revenue;

  // ─── hero subtitle ─────────────────────────────────────────────────────────

  // ─── footer ────────────────────────────────────────────────────────────────

    {tag:'Lowest Order',text:`<strong>${esc(minRev.order_id)}</strong> — ${esc(minRev.product)} in ${esc(minRev.region)} on ${minRev.date} totalled only <strong>${fmtUSD(minRev.revenue)}</strong>, the floor of the month.`},
  ];
  const calloutWrap = document.getElementById('callouts');
  callouts.forEach(c=>{

  // ─── COLOR PALETTE ─────────────────────────────────────────────────────────
  const COLORS=['#a03b00','#7b40e0','#4d44e3','#00D4FF','#10b981','#f59e0b'];

  function brandColor(i){

  }

  // region badge colors
  const regionColors={'West':'#a03b00','East':'#7b40e0','Central':'#10b981','South':'#f59e0b','North':'#4d44e3'};
  const regionBg={'West':'rgba(160,59,0,0.12)','East':'rgba(123,64,224,0.12)','Central':'rgba(16,185,129,0.12)','South':'rgba(245,158,11,0.12)','North':'rgba(77,68,227,0.12)'};

  // ─── CHARTS ────────────────────────────────────────────────────────────────

    });
    // animate
    requestAnimationFrame(()=>{
      c.querySelectorAll('.bar-fill').forEach(el=>{
        el.style.width=el.dataset.pct+'%';
      });
    });
  }
  buildBarChart('region-bar', regionsSorted, i=>brandColor(i));

  // 2. Revenue by Product (horizontal bar)
  const prodCard = document.createElement('div');
  prodCard.className='chart-card';
  prodCard.innerHTML=`<h3>Revenue by Product</h3><div class="bar-chart" id="product-bar"></div>`;
  cg.appendChild(prodCard);
  buildBarChart('product-bar', productsSorted, i=>brandColor(i));

  // 3. Time series (daily revenue)
  const tsCard = document.createElement('div');
  tsCard.className='chart-card wide';
  tsCard.innerHTML=`<h3>Daily Revenue — January 2026</h3><div id="ts-chart"></div>`;
  cg.appendChild(tsCard);

  function buildTimeSeries(){
    const W=Math.min(1060,window.innerWidth-80);
    const H=180;
    const pad={top:16,right:16,bottom:36,left:64};
    const vals=datesSorted.map(d=>byDate[d]);
    const maxV=max(vals)||1;
    const n=datesSorted.length;
    const xStep=(W-pad.left-pad.right)/(n-1||1);
    const yScale=v=>(H-pad.top-pad.bottom)*(1-v/maxV)+pad.top;
    const points=vals.map((v,i)=>({
      x:pad.left+i*xStep,
      y:yScale(v),
      d:datesSorted[i],
      v
    }));
    const pathD='M'+points.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('L');
    const fillD=pathD+`L${points[points.length-1].x.toFixed(1)},${H-pad.bottom}L${points[0].x.toFixed(1)},${H-pad.bottom}Z`;
    const peakIdx=vals.indexOf(max(vals));
    const dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const c1=dark?'#FF6B35':'#a03b00';
    // y axis ticks
    const yTicks=[0,maxV*0.25,maxV*0.5,maxV*0.75,maxV];
    const yTickSVG=yTicks.map(v=>`
      <line x1="${pad.left}" y1="${yScale(v).toFixed(1)}" x2="${W-pad.right}" y2="${yScale(v).toFixed(1)}" stroke="var(--border-strong)" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="${pad.left-6}" y="${(yScale(v)+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--fg-muted)" font-family="var(--font-mono)">${fmtUSD(v).replace('$','$').replace(',000','K')}</text>
    `).join('');
    // x ticks (every ~5 days)
    const xTickSVG=points.filter((_,i)=>i===0||i===n-1||(i+1)%5===0).map(p=>`
      <text x="${p.x.toFixed(1)}" y="${H-pad.bottom+14}" text-anchor="middle" font-size="10" fill="var(--fg-muted)" font-family="var(--font-mono)">${p.d.slice(5)}</text>
    `).join('');
    const peak=points[peakIdx];
    const svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible">
      <defs>
        <linearGradient id="tsgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${c1}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${c1}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      ${yTickSVG}
      ${xTickSVG}
      <path d="${fillD}" fill="url(#tsgrad)"/>
      <path d="${pathD}" fill="none" stroke="${c1}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${points.map((p,i)=>i===peakIdx?`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5" fill="${c1}" stroke="var(--surface-container-lowest)" stroke-width="2"/>`:``).join('')}
      ${peak?`<text x="${peak.x.toFixed(1)}" y="${(peak.y-12).toFixed(1)}" text-anchor="middle" font-size="10.5" fill="${c1}" font-weight="700" font-family="var(--font-mono)">${fmtUSD(peak.v)}</text>`:''}
    </svg>`;
    document.getElementById('ts-chart').innerHTML=svg;
  }

  function buildDonut(){

    const total=sum(entries.map(e=>e[1]));
    const R=70,cx=85,cy=85,stroke=22;

      const dash=circumference*pct;
      const gap=circumference-dash;
      const s=`<circle cx="${cx}" cy="${cy}" r="${R}"
        fill="none"
        stroke="${brandColor(i)}"
        stroke-width="${stroke}"
        stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
        stroke-dashoffset="${(-offset*circumference+circumference/4).toFixed(2)}"
        transform="rotate(-90 ${cx} ${cy})"
        opacity="0.92"/>`;
      offset+=pct;
      return s;
    }).join('');
    const legend=entries.map((e,i)=>`
      <div class="legend-item">
        <span class="legend-dot" style="background:${brandColor(i)}"></span>
        <span>${esc(e[0])}</span>
        <span class="legend-val">${Math.round(e[1]/total*100)}%</span>
      </div>`).join('');
    const wrap=document.getElementById('donut-wrap');
    wrap.innerHTML=`
      <svg width="170" height="170" viewBox="0 0 170 170">
        ${slices}

  const regions=['All',...Object.keys(byRegion).sort()];
  let activeRegion='All';
  regions.forEach(r=>{
    const chip=document.createElement('button');
    chip.className='chip'+(r==='All'?' active':'');
    chip.textContent=r;
    chip.addEventListener('click',()=>{
      activeRegion=r;
      chips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.textContent===r));
      renderTable();
    });
    chips.appendChild(chip);
  });

  // state
  let searchQ='';
  let sortKey='';
  let sortDir=1;

  function sortBy(key){
    if(sortKey===key)sortDir*=-1;
    else{sortKey=key;sortDir=-1;}
    renderTable();
    // update arrows
    thead.querySelectorAll('th').forEach(th=>{
      th.classList.toggle('sorted',th.dataset.key===key);
      const arr=th.querySelector('.sort-arrow');
      if(arr)arr.textContent=th.dataset.key===key?(sortDir>0?'↑':'↓'):'↕';
    });
  }

  document.getElementById('search-input').addEventListener('input',e=>{
    searchQ=e.target.value.toLowerCase().trim();
    renderTable();
  });

  document.getElementById('sort-select').addEventListener('change',e=>{
    const v=e.target.value;
    if(!v){sortKey='';renderTable();return;}
    const [k,d]=v.split('-');
    sortKey=k==='date'?'date':k;
    sortDir=d==='asc'?1:-1;
    renderTable();
  });

  function highlight(text,q){
    if(!q)return esc(text);
    const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return esc(text).replace(re,'<mark>$1</mark>');
  }

  function renderTable(){
    let data=[...parsed];
    if(activeRegion!=='All')data=data.filter(r=>r.region===activeRegion);
    if(searchQ){
      data=data.filter(r=>
        r.raw.some(cell=>String(cell).toLowerCase().includes(searchQ))
      );
    }
    if(sortKey){
      data.sort((a,b)=>{
        const av=a[sortKey],bv=b[sortKey];
        if(typeof av==='number')return(av-bv)*sortDir;
        return String(av).localeCompare(String(bv))*sortDir;
      });
    }
    const badge=document.getElementById('visible-count-badge');
    badge.textContent=`${data.length} shown`;

    const tbody=document.getElementById('table-body');
    if(data.length===0){
      tbody.innerHTML=`<tr><td colspan="${headers.length}" class="no-rows">No rows match your search.</td></tr>`;
      return;
    }
    const q=searchQ;
    tbody.innerHTML=data.map(r=>{
      const rc=regionColors[r.region]||'var(--fg-muted)';
      const rb=regionBg[r.region]||'var(--surface-container)';
      return `<tr>
        <td><span class="order-id">${highlight(r.order_id,q)}</span></td>
        <td>${highlight(r.date,q)}</td>
        <td><span class="region-badge" style="color:${rc};background:${rb}">${highlight(r.region,q)}</span></td>
        <td>${highlight(r.product,q)}</td>
        <td class="numeric">${highlight(String(r.units),q)}</td>
        <td class="numeric">${highlight(fmtUSD2(r.unit_price),q)}</td>
        <td class="numeric revenue">${highlight(fmtUSD2(r.revenue),q)}</td>
        <td>${highlight(r.sales_rep,q)}</td>
      </tr>`;
    }).join('');
  }
  renderTable();

  // copy CSV
  document.getElementById('copy-csv-btn').addEventListener('click',function(){
    const csvContent=[headers.join(','),...parsed.map(r=>r.raw.map(c=>JSON.stringify(c)).join(','))].join('\n');
    navigator.clipboard.writeText(csvContent).then(()=>{
      this.textContent='Copied!';
      this.classList.add('copied');
      setTimeout(()=>{this.textContent='Copy CSV';this.classList.remove('copied');},2000);
    });
  });

})();
</script>
</body>
</html>
